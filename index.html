                      <Button variant="secondary" className="text-xs h-9" onClick={() => { setPenerimaanData(initialPenerimaanState); setModalType('penerimaan_form'); }}>+ Catat Penerimaan</Button>
                      <Button variant="secondary" className="text-xs h-9 border border-red-200 text-red-600 hover:bg-red-50 hover:text-red-700" onClick={() => { setPengeluaranData(initialPengeluaranState); setModalType('pengeluaran_form'); }}>- Catat Pengeluaran</Button>
                      <Button variant="primary" className="text-xs h-9" onClick={() => { setPersediaanData(initialPersediaanState); setModalType('persediaan_form'); }}>+ Master Barang Baru</Button>
                    </div>
                  </div>
                  
                  {/* Multi-Tab Navigation */}
                  <div className="bg-gray-50 border-b px-6 flex space-x-4 overflow-x-auto print-hide">
                    {['Buku Barang', 'Buku Penerimaan', 'Buku Pengeluaran', 'Kartu Barang', 'Laporan Rekapitulasi'].map(tab => (
                      <button key={tab} onClick={() => setPersediaanTab(tab)} className={`py-3 border-b-2 font-medium text-sm whitespace-nowrap transition-colors ${persediaanTab === tab ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                        {tab}
                      </button>
                    ))}
                  </div>

                  <div className="p-6 overflow-x-auto">
                    
                    {/* TAB: BUKU BARANG (MASTER) */}
                    {persediaanTab === 'Buku Barang' && (
                      <div>
                        <div className="text-center mb-6 hidden print:block">
                          <h2 className="font-bold text-lg underline uppercase">Buku Barang Persediaan</h2>
                          <p className="text-xs mt-1">TAHUN ANGGARAN {filterTahunPersediaan}</p>
                        </div>
                        <table id="persediaan-table-export" className="w-full text-left text-xs whitespace-nowrap border-collapse border border-gray-200">
                          <thead className="bg-gray-100 text-gray-700 font-bold">
                            <tr>
                              <th rowSpan="2" className="p-2 border">Kode Rek.</th>
                              <th rowSpan="2" className="p-2 border">Nama Barang</th>
                              <th colSpan="3" className="p-2 border text-center">Saldo Awal</th>
                              <th colSpan="3" className="p-2 border text-center text-green-600 bg-green-50">Penerimaan</th>
                              <th colSpan="3" className="p-2 border text-center text-red-600 bg-red-50">Pengeluaran</th>
                              <th colSpan="3" className="p-2 border text-center text-blue-600 bg-blue-50">Saldo Akhir</th>
                              <th rowSpan="2" className="p-2 border text-center print-hide">Aksi</th>
                            </tr>
                            <tr>
                              <th className="p-2 border text-center font-normal">Vol</th><th className="p-2 border text-right font-normal">Hrg Satuan</th><th className="p-2 border text-right font-normal">Jml Harga</th>
                              <th className="p-2 border text-center font-normal bg-green-50">Vol</th><th className="p-2 border text-right font-normal bg-green-50">Hrg Satuan</th><th className="p-2 border text-right font-normal bg-green-50">Jml Harga</th>
                              <th className="p-2 border text-center font-normal bg-red-50">Vol</th><th className="p-2 border text-right font-normal bg-red-50">Hrg Satuan</th><th className="p-2 border text-right font-normal bg-red-50">Jml Harga</th>
                              <th className="p-2 border text-center font-normal bg-blue-50">Vol</th><th className="p-2 border text-right font-normal bg-blue-50">Hrg Satuan</th><th className="p-2 border text-right font-normal bg-blue-50">Jml Harga</th>
                            </tr>
                          </thead>
                          <tbody>
                            {persediaanFiltered.length === 0 && <tr><td colSpan="15" className="p-4 text-center text-gray-400 italic">Belum ada master barang di tahun {filterTahunPersediaan}.</td></tr>}
                            {persediaanFiltered.map(p => {
                              const stats = getPersediaanStats(p.id);
                              return (
                                <tr key={p.id} className="hover:bg-gray-50">
                                  <td className="p-2 border font-mono text-[10px]">{p.kode}</td>
                                  <td className="p-2 border font-bold text-gray-800">{p.nama}</td>
                                  
                                  <td className="p-2 border text-center">{stats.awal} {p.satuan}</td>
                                  <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.harga)}</td>
                                  <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.awal * stats.harga)}</td>
                                  
                                  <td className="p-2 border text-center text-green-700 font-medium">{stats.masuk} {p.satuan}</td>
                                  <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.harga)}</td>
                                  <td className="p-2 border text-right font-mono text-[10px] text-green-700">{formatRupiah(stats.totalMasukRp > 0 ? stats.totalMasukRp : stats.masuk * stats.harga)}</td>
                                  
                                  <td className="p-2 border text-center text-red-600 font-medium">{stats.keluar} {p.satuan}</td>
                                  <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.harga)}</td>
                                  <td className="p-2 border text-right font-mono text-[10px] text-red-600">{formatRupiah(stats.keluar * stats.harga)}</td>
                                  
                                  <td className="p-2 border text-center font-bold">{stats.akhir} {p.satuan}</td>
                                  <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.harga)}</td>
                                  <td className="p-2 border text-right font-bold text-blue-700 font-mono text-[10px]">{formatRupiah(stats.akhir * stats.harga)}</td>
                                  
                                  <td className="p-2 border text-center print-hide">
                                    <div className="flex justify-center gap-1">
                                      <button className="text-blue-600 p-1 hover:bg-blue-50 rounded" onClick={() => { setPersediaanData(p); setModalType('persediaan_form'); }}><Edit3 size={14}/></button>
                                      <button className="text-red-500 p-1 hover:bg-red-50 rounded" onClick={() => askConfirm("Hapus barang persediaan ini secara permanen?", () => deleteFromDb('persediaan', p.id))}><Trash2 size={14}/></button>
                                    </div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {/* TAB: BUKU PENERIMAAN */}
                    {persediaanTab === 'Buku Penerimaan' && (
                      <div>
                        <div className="text-center mb-6 hidden print:block">
                          <h2 className="font-bold text-lg underline uppercase">Buku Penerimaan Barang</h2>
                          <p className="text-xs mt-1">TAHUN ANGGARAN {filterTahunPersediaan}</p>
                        </div>
                        <table id="persediaan-table-export" className="w-full text-left text-xs whitespace-nowrap border-collapse border border-gray-200">
                          <thead className="bg-gray-50 text-gray-600 font-bold">
                            <tr>
                              <th rowSpan="2" className="p-2 border text-center">No.</th>
                              <th rowSpan="2" className="p-2 border">Tgl Diterima</th>
                              <th rowSpan="2" className="p-2 border text-center">Dari (LS/GU)</th>
                              <th colSpan="2" className="p-2 border text-center">Dokumen</th>
                              <th rowSpan="2" className="p-2 border text-center">Jml</th>
                              <th rowSpan="2" className="p-2 border">Nama Barang</th>
                              <th rowSpan="2" className="p-2 border text-right">Harga Satuan</th>
                              <th rowSpan="2" className="p-2 border text-right">PPN (%)</th>
                              <th rowSpan="2" className="p-2 border text-right">Harga PPN (Rp)</th>
                              <th rowSpan="2" className="p-2 border text-right">Total Harga</th>
                              <th colSpan="2" className="p-2 border text-center">BA Penerimaan</th>
                              <th rowSpan="2" className="p-2 border">Ket/PPTK</th>
                              <th rowSpan="2" className="p-2 border text-center print-hide">Aksi</th>
                            </tr>
                            <tr>
                              <th className="p-2 border font-normal">Nomor</th><th className="p-2 border font-normal">Tanggal</th>
                              <th className="p-2 border font-normal">Nomor</th><th className="p-2 border font-normal">Tanggal</th>
                            </tr>
                          </thead>
                          <tbody>
                            {transaksiFiltered.filter(t => t.jenis === 'Penerimaan').sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal)).map((t, idx) => {
                              const brg = persediaan.find(p => p.id === t.idBarang) || {};
                              return (
                                <tr key={t.id} className="hover:bg-gray-50">
                                  <td className="p-2 border text-center">{idx + 1}</td>
                                  <td className="p-2 border">{formatTanggalIndo(t.tanggal)}</td>
                                  <td className="p-2 border text-center font-bold">{t.sumber}</td>
                                  <td className="p-2 border">{t.noDokumen || '-'}</td>
                                  <td className="p-2 border">{t.tglDokumen ? formatTanggalIndo(t.tglDokumen) : '-'}</td>
                                  <td className="p-2 border text-center font-bold text-green-700">{t.jumlah} {brg.satuan}</td>
                                  <td className="p-2 border font-bold">{brg.nama}</td>
                                  <td className="p-2 border text-right font-mono">{formatRupiah(t.hargaSatuan)}</td>
                                  <td className="p-2 border text-right font-mono text-gray-500">{t.persenPPN || 0}%</td>
                                  <td className="p-2 border text-right font-mono">{formatRupiah(t.hargaPPN)}</td>
                                  <td className="p-2 border text-right font-bold text-blue-700 font-mono">{formatRupiah(t.totalHarga)}</td>
                                  <td className="p-2 border">{t.noBA || '-'}</td>
                                  <td className="p-2 border">{t.tglBA ? formatTanggalIndo(t.tglBA) : '-'}</td>
                                  <td className="p-2 border">{t.keterangan || '-'}</td>
                                  <td className="p-2 border text-center print-hide">
                                    <button className="text-red-500 p-1 hover:bg-red-50 rounded" onClick={() => askConfirm("Hapus transaksi masuk ini?", () => deleteFromDb('transaksi_persediaan', t.id))}><Trash2 size={14}/></button>
                                  </td>
                                </tr>
                              );
                            })}
                            {transaksiFiltered.filter(t => t.jenis === 'Penerimaan').length === 0 && <tr><td colSpan="15" className="p-4 text-center text-gray-400 italic">Belum ada riwayat penerimaan barang.</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {/* TAB: BUKU PENGELUARAN */}
                    {persediaanTab === 'Buku Pengeluaran' && (
                      <div>
                        <div className="text-center mb-6 hidden print:block">
                          <h2 className="font-bold text-lg underline uppercase">Buku Pengeluaran Barang</h2>
                          <p className="text-xs mt-1">TAHUN ANGGARAN {filterTahunPersediaan}</p>
                        </div>
                        <table id="persediaan-table-export" className="w-full text-left text-xs whitespace-nowrap border-collapse border border-gray-200">
                          <thead className="bg-gray-50 text-gray-600 font-bold">
                            <tr>
                              <th className="p-2 border text-center">No.</th>
                              <th className="p-2 border">Tanggal Keluar</th>
                              <th className="p-2 border">Nama Barang</th>
                              <th className="p-2 border text-center">Jumlah Keluar</th>
                              <th className="p-2 border text-right">Harga Satuan</th>
                              <th className="p-2 border text-right">Total Harga</th>
                              <th className="p-2 border">Untuk (Sub Bagian)</th>
                              <th className="p-2 border">Keterangan</th>
                              <th className="p-2 border text-center print-hide">Aksi</th>
                            </tr>
                          </thead>
                          <tbody>
                            {transaksiFiltered.filter(t => t.jenis === 'Pengeluaran').sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal)).map((t, idx) => {
                              const brg = persediaan.find(p => p.id === t.idBarang) || {};
                              const harga = brg.hargaSatuan || 0;
                              return (
                                <tr key={t.id} className="hover:bg-gray-50">
                                  <td className="p-2 border text-center">{idx + 1}</td>
                                  <td className="p-2 border">{formatTanggalIndo(t.tanggal)}</td>
                                  <td className="p-2 border font-bold">{brg.nama}</td>
                                  <td className="p-2 border text-center font-bold text-red-600">{t.jumlah} {brg.satuan}</td>
                                  <td className="p-2 border text-right font-mono">{formatRupiah(harga)}</td>
                                  <td className="p-2 border text-right font-bold font-mono">{formatRupiah(t.jumlah * harga)}</td>
                                  <td className="p-2 border">{t.untuk}</td>
                                  <td className="p-2 border">{t.keterangan || '-'}</td>
                                  <td className="p-2 border text-center print-hide">
                                    <button className="text-red-500 p-1 hover:bg-red-50 rounded" onClick={() => askConfirm("Hapus transaksi keluar ini?", () => deleteFromDb('transaksi_persediaan', t.id))}><Trash2 size={14}/></button>
                                  </td>
                                </tr>
                              );
                            })}
                            {transaksiFiltered.filter(t => t.jenis === 'Pengeluaran').length === 0 && <tr><td colSpan="9" className="p-4 text-center text-gray-400 italic">Belum ada riwayat pengeluaran barang.</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {/* TAB: KARTU BARANG */}
                    {persediaanTab === 'Kartu Barang' && (
                      <div>
                        <div className="mb-6 max-w-md print-hide">
                          <Select 
                            label="Pilih Barang untuk Dilihat Kartunya" 
                            value={selectedKartuBarang} 
                            onChange={setSelectedKartuBarang} 
                            options={persediaanFiltered.map(p => ({value: p.id, label: `${p.kode} - ${p.nama}`}))} 
                          />
                        </div>
                        
                        {selectedKartuBarang ? (() => {
                          const brg = persediaanFiltered.find(p => p.id === selectedKartuBarang);
                          if(!brg) return <p className="text-gray-500 italic">Barang tidak ditemukan.</p>;
                          
                          const txs = transaksiFiltered.filter(t => t.idBarang === selectedKartuBarang).sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));
                          let currentStock = parseInt(brg.saldoAwal || 0);
                          
                          return (
                            <div className="border border-gray-200 rounded-lg p-6 bg-white">
                               <div className="text-center mb-6">
                                 <h2 className="font-bold text-lg underline uppercase">KARTU BARANG</h2>
                                 <p className="text-xs mt-1">TAHUN ANGGARAN {filterTahunPersediaan}</p>
                               </div>
                               <div className="flex justify-between mb-4 text-sm font-medium border-b pb-4">
                                 <div>
                                    <p className="text-gray-500 text-xs">NAMA BARANG</p><p className="font-bold mb-2">{brg.nama}</p>
                                    <p className="text-gray-500 text-xs">SATUAN</p><p className="font-bold">{brg.satuan}</p>
                                 </div>
                                 <div className="text-right">
                                    <p className="text-gray-500 text-xs">KODE REKENING</p><p className="font-bold mb-2 font-mono">{brg.kode}</p>
                                    <p className="text-gray-500 text-xs">SALDO AWAL KARTU</p><p className="font-bold">{brg.saldoAwal}</p>
                                 </div>
                               </div>
                               <table id="persediaan-table-export" className="w-full text-left text-xs whitespace-nowrap border-collapse border border-gray-200">
                                 <thead className="bg-gray-50 text-gray-700 font-bold">
                                   <tr>
                                     <th className="p-3 border text-center">No</th>
                                     <th className="p-3 border">Tanggal</th>
                                     <th className="p-3 border text-center text-green-600 bg-green-50">Masuk</th>
                                     <th className="p-3 border text-center text-red-600 bg-red-50">Keluar</th>
                                     <th className="p-3 border text-center text-blue-700 bg-blue-50">Sisa</th>
                                     <th className="p-3 border">Keterangan Mutasi</th>
                                   </tr>
                                 </thead>
                                 <tbody>
                                   <tr className="bg-gray-100">
                                     <td className="p-3 border text-center">-</td>
                                     <td className="p-3 border italic text-gray-500">Saldo Awal Sistem</td>
                                     <td className="p-3 border text-center">-</td>
                                     <td className="p-3 border text-center">-</td>
                                     <td className="p-3 border text-center font-bold text-blue-700">{currentStock}</td>
                                     <td className="p-3 border text-gray-500">-</td>
                                   </tr>
                                   {txs.map((t, i) => {
                                     const qty = parseInt(t.jumlah || 0);
                                     if (t.jenis === 'Penerimaan') currentStock += qty;
                                     if (t.jenis === 'Pengeluaran') currentStock -= qty;
                                     return (
                                       <tr key={t.id} className="hover:bg-gray-50">
                                         <td className="p-3 border text-center">{i+1}</td>
                                         <td className="p-3 border">{formatTanggalIndo(t.tanggal)}</td>
                                         <td className="p-3 border text-center font-bold text-green-600">{t.jenis === 'Penerimaan' ? `+ ${qty}` : ''}</td>
                                         <td className="p-3 border text-center font-bold text-red-600">{t.jenis === 'Pengeluaran' ? `- ${qty}` : ''}</td>
                                         <td className="p-3 border text-center font-bold text-blue-700">{currentStock}</td>
                                         <td className="p-3 border">{t.keterangan || (t.jenis === 'Pengeluaran' ? `Didistribusikan ke: ${t.untuk}` : `Sumber: ${t.sumber} ${t.noDokumen}`)}</td>
                                       </tr>
                                     );
                                   })}
                                   {txs.length === 0 && <tr><td colSpan="6" className="p-4 text-center text-gray-400 italic">Belum ada mutasi/transaksi untuk barang ini.</td></tr>}
                                 </tbody>
                               </table>
                            </div>
                          );
                        })() : (
                          <div className="p-12 text-center text-gray-400 border-2 border-dashed rounded-xl bg-gray-50">
                            <FileText size={48} className="mx-auto mb-3 opacity-50" />
                            <p>Silakan pilih barang pada dropdown di atas untuk melihat rincian Kartu Barang.</p>
                          </div>
                        )}
                      </div>
                    )}

                    {/* TAB: LAPORAN REKAPITULASI */}
                    {persediaanTab === 'Laporan Rekapitulasi' && (() => {
                      const groups = {};
                      persediaanFiltered.forEach(p => {
                        if (!groups[p.kode]) groups[p.kode] = { kode: p.kode, namaRekening: p.namaRekening, items: [] };
                        groups[p.kode].items.push(p);
                      });

                      let grandTotalAwal = 0, grandTotalMasuk = 0, grandTotalKeluar = 0, grandTotalAkhir = 0;

                      return (
                        <div>
                          <div className="text-center mb-6 hidden print:block">
                            <h2 className="font-bold text-lg underline uppercase">Laporan Rekapitulasi Barang Persediaan</h2>
                            <p className="text-xs mt-1">TAHUN ANGGARAN {filterTahunPersediaan}</p>
                          </div>
                          <table id="persediaan-table-export" className="w-full text-left text-xs whitespace-nowrap border-collapse border border-gray-200">
                            <thead className="bg-gray-100 text-gray-700 font-bold">
                              <tr>
                                <th className="p-3 border text-center">NO</th>
                                <th className="p-3 border">KODE REKENING / URAIAN BARANG</th>
                                <th className="p-3 border text-right">SALDO AWAL (Rp)</th>
                                <th className="p-3 border text-right text-green-700">MASUK (Rp)</th>
                                <th className="p-3 border text-right text-red-700">KELUAR (Rp)</th>
                                <th className="p-3 border text-right text-blue-700">SALDO AKHIR (Rp)</th>
                              </tr>
                            </thead>
                            <tbody>
                              {Object.keys(groups).length === 0 && <tr><td colSpan="6" className="p-4 text-center text-gray-400 italic">Belum ada data barang.</td></tr>}
                              {Object.values(groups).map((g, idx) => {
                                let totalAwal = 0, totalMasuk = 0, totalKeluar = 0, totalAkhir = 0;
                                g.items.forEach(item => {
                                  const stats = getPersediaanStats(item.id);
                                  totalAwal += (stats.awal * stats.harga);
                                  totalMasuk += (stats.totalMasukRp > 0 ? stats.totalMasukRp : stats.masuk * stats.harga);
                                  totalKeluar += (stats.keluar * stats.harga);
                                  totalAkhir += (stats.akhir * stats.harga);
                                });
                                
                                grandTotalAwal += totalAwal; grandTotalMasuk += totalMasuk; grandTotalKeluar += totalKeluar; grandTotalAkhir += totalAkhir;
                                
                                return (
                                  <React.Fragment key={g.kode}>
                                    <tr className="bg-blue-50 font-bold text-blue-900 border-t-2 border-t-blue-200">
                                      <td className="p-3 border text-center">{idx + 1}</td>
                                      <td className="p-3 border">{g.kode} - <span className="uppercase">{g.namaRekening}</span></td>
                                      <td className="p-3 border text-right font-mono">{formatRupiah(totalAwal)}</td>
                                      <td className="p-3 border text-right font-mono">{formatRupiah(totalMasuk)}</td>
                                      <td className="p-3 border text-right font-mono">{formatRupiah(totalKeluar)}</td>
                                      <td className="p-3 border text-right font-mono text-blue-700">{formatRupiah(totalAkhir)}</td>
                                    </tr>
                                    {g.items.map(item => {
                                       const stats = getPersediaanStats(item.id);
                                       return (
                                         <tr key={item.id} className="text-gray-600 hover:bg-gray-50">
                                           <td className="p-2 border"></td>
                                           <td className="p-2 border pl-8 flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-gray-400"></span> {item.nama}</td>
                                           <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.awal * stats.harga)}</td>
                                           <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.totalMasukRp > 0 ? stats.totalMasukRp : stats.masuk * stats.harga)}</td>
                                           <td className="p-2 border text-right font-mono text-[10px]">{formatRupiah(stats.keluar * stats.harga)}</td>
                                           <td className="p-2 border text-right font-mono text-[10px] font-bold">{formatRupiah(stats.akhir * stats.harga)}</td>
                                         </tr>
                                       )
                                    })}
                                  </React.Fragment>
                                );
                              })}
                              {Object.keys(groups).length > 0 && (
                                <tr className="bg-gray-800 text-white font-bold">
                                  <td colSpan="2" className="p-4 border text-center uppercase tracking-wider">Jumlah Total Keseluruhan</td>
                                  <td className="p-4 border text-right font-mono text-sm">{formatRupiah(grandTotalAwal)}</td>
                                  <td className="p-4 border text-right font-mono text-sm text-green-300">{formatRupiah(grandTotalMasuk)}</td>
                                  <td className="p-4 border text-right font-mono text-sm text-red-300">{formatRupiah(grandTotalKeluar)}</td>
                                  <td className="p-4 border text-right font-mono text-sm text-blue-300">{formatRupiah(grandTotalAkhir)}</td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      );
                    })()}

                  </div>
                </div>
              )}

              {/* --- Menu Arsip Dokumen --- */}
              {view === 'arsip' && (() => {
                const filteredArsip = filterJenisArsip 
                  ? arsipSurat.filter(a => a.jenisSurat === filterJenisArsip)
                  : arsipSurat;

                return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4 print-hide">
                    <h3 className="font-bold text-lg">Arsip Dokumen Administrasi</h3>
                    <div className="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border">
                      <Filter size={16} className="text-gray-400" />
                      <select 
                        value={filterJenisArsip} 
                        onChange={(e) => setFilterJenisArsip(e.target.value)} 
                        className="bg-transparent text-sm font-medium outline-none text-gray-600 cursor-pointer"
                      >
                        <option value="">Semua Jenis Dokumen</option>
                        <option value="PAKTA">Pakta Integritas</option>
                        <option value="LAMPIRAN_PAKTA">Lampiran Pakta</option>
                        <option value="BAST_KENDARAAN">BAST Kendaraan</option>
                        <option value="BAST_BMD">BAST BMD</option>
                        <option value="PERMOHONAN">BA Permohonan</option>
                        <option value="PENGEMBALIAN">BA Pengembalian</option>
                      </select>
                    </div>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-gray-50 text-gray-500 uppercase font-bold border-b text-[10px]">
                        <tr>
                          <th className="px-4 py-3">Tanggal Dibuat</th>
                          <th className="px-4 py-3">Jenis Dokumen</th>
                          <th className="px-4 py-3">Nomor Surat</th>
                          <th className="px-4 py-3">Pihak 1 (Utama)</th>
                          <th className="px-4 py-3">Pihak 2</th>
                          <th className="px-4 py-3 text-center print-hide">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {filteredArsip.length === 0 ? (
                          <tr><td colSpan="6" className="text-center py-8 text-gray-400 italic">Belum ada dokumen yang diarsipkan.</td></tr>
                        ) : (
                          filteredArsip.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(arsip => (
                            <tr key={arsip.id} className="hover:bg-gray-50">
                              <td className="px-4 py-3 font-mono text-xs">{new Date(arsip.createdAt).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' })}</td>
                              <td className="px-4 py-3 font-bold text-blue-700">{arsip.jenisSurat.replace('_', ' ')}</td>
                              <td className="px-4 py-3 font-mono text-xs">{arsip.nomorSurat || '-'}</td>
                              <td className="px-4 py-3">{getPegawaiObj(arsip.pihak1Id).nama}</td>
                              <td className="px-4 py-3">{arsip.pihak2Id ? getPegawaiObj(arsip.pihak2Id).nama : '-'}</td>
                              <td className="px-4 py-3 text-center print-hide">
                                <div className="flex justify-center gap-2">
                                  <Button variant="outline" className="text-xs py-1 px-2 h-8" onClick={() => handleOpenArsip(arsip)}>Buka / Cetak</Button>
                                  <Button variant="danger" className="text-xs py-1 px-2 h-8" onClick={() => askConfirm('Yakin ingin menghapus arsip ini?', () => deleteFromDb('arsip_surat', arsip.id))}>Hapus</Button>
                                </div>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
                );
              })()}

              {/* --- Fitur Administrasi & Cetak Dokumen --- */}
              {view === 'administrasi' && (
                <div className="flex flex-col lg:flex-row gap-8">
                  {/* Panel Opsi Formulir Administrasi */}
                  <div className="w-full lg:w-1/3 space-y-4 print-hide">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      <div className="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 className="font-bold text-lg">Pengaturan Surat</h3>
                        <Button variant="outline" className="text-xs h-8 px-2 py-1" onClick={() => setAdminForm(initialAdminForm)}>
                          <Plus size={14}/> Buat Baru
                        </Button>
                      </div>
                      
                      <div className="mb-4">
                        <label className="block text-sm font-semibold text-gray-700 mb-1.5">Ganti Logo Kop (Opsional)</label>
                        <input type="file" accept="image/*" onChange={(e) => handleImageCompress(e.target.files[0], (url) => setAdminForm({...adminForm, customLogo: url}))} className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 text-sm" />
                      </div>

                      <Select 
                        label="Jenis Surat / Dokumen" 
                        value={adminForm.jenisSurat} 
                        onChange={(v) => setAdminForm({...adminForm, jenisSurat: v})}
                        options={[
                          {value: 'PAKTA', label: 'Pakta Integritas'},
                          {value: 'LAMPIRAN_PAKTA', label: 'Lampiran Pakta Integritas'},
                          {value: 'BAST_KENDARAAN', label: 'BAST Kendaraan Dinas'},
                          {value: 'BAST_BMD', label: 'BAST Barang Milik Daerah'},
                          {value: 'PERMOHONAN', label: 'BA Permohonan Barang'},
                          {value: 'PENGEMBALIAN', label: 'BA Pengembalian Barang'}
                        ]}
                      />
                      
                      <Input label="Tanggal Surat" type="date" value={adminForm.tanggal} onChange={(v) => setAdminForm({...adminForm, tanggal: v})} />
                      <Input label="Nomor Surat (Opsional)" value={adminForm.nomorSurat} onChange={(v) => setAdminForm({...adminForm, nomorSurat: v})} />
                      
                      {adminForm.jenisSurat !== 'PAKTA' && adminForm.jenisSurat !== 'LAMPIRAN_PAKTA' && adminForm.jenisSurat !== 'BAST_KENDARAAN' && adminForm.jenisSurat !== 'BAST_BMD' && (
                        <div className="mb-4">
                           <label className="block text-sm font-semibold text-gray-700 mb-1.5">Referensi / Dasar Surat (Opsional)</label>
                           <textarea rows="3" placeholder="Contoh: Berdasarkan Surat Edaran Nomor..." value={adminForm.referensiSurat} onChange={(e) => setAdminForm({...adminForm, referensiSurat: e.target.value})} className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-400"></textarea>
                        </div>
                      )}

                      <div className="mt-6 space-y-4">
                        <Select 
                          label={(adminForm.jenisSurat === 'BAST_KENDARAAN' || adminForm.jenisSurat === 'BAST_BMD') ? 'Pihak Pertama (Yang Menyerahkan)' : adminForm.jenisSurat === 'PENGEMBALIAN' ? 'Pihak Pertama (Yang Mengembalikan)' : (adminForm.jenisSurat === 'PAKTA' || adminForm.jenisSurat === 'LAMPIRAN_PAKTA') ? 'Data Pegawai / ASN' : 'Pihak Pemohon'} 
                          value={adminForm.pihak1Id} 
                          onChange={(v) => setAdminForm({...adminForm, pihak1Id: v})} 
                          options={[{value: '', label: '-- Pilih Pegawai --'}, ...pegawai.map(p => ({value: p.id, label: p.nama}))]} 
                        />

                        {(adminForm.jenisSurat === 'PAKTA' || adminForm.jenisSurat === 'LAMPIRAN_PAKTA' || adminForm.jenisSurat === 'BAST_KENDARAAN' || adminForm.jenisSurat === 'BAST_BMD') && (
                          <div className="p-4 bg-blue-50 rounded-lg border border-blue-100 text-sm">
                            <p className="text-blue-800 font-semibold mb-2 flex items-center gap-2"><Info size={16}/> Integrasi Otomatis</p>
                            <p className="text-gray-600">Sistem mendeteksi kendaraan & barang yang sedang dipegang oleh Pegawai terpilih untuk mengisi teks surat dan tabel rincian secara otomatis.</p>
                          </div>
                        )}
                        
                        {(adminForm.jenisSurat === 'BAST_KENDARAAN' || adminForm.jenisSurat === 'BAST_BMD' || adminForm.jenisSurat === 'PENGEMBALIAN') && (
                          <Select 
                            label="Pihak Kedua (Yang Menerima)" 
                            value={adminForm.pihak2Id} 
                            onChange={(v) => setAdminForm({...adminForm, pihak2Id: v})} 
                            options={[{value: '', label: '-- Pilih Pegawai --'}, ...pegawai.map(p => ({value: p.id, label: p.nama}))]} 
                          />
                        )}

                        {(adminForm.jenisSurat === 'PENGEMBALIAN' || adminForm.jenisSurat === 'PERMOHONAN') && (
                          <Select 
                            label="Aset / Barang Terkait" 
                            value={adminForm.barangId} 
                            onChange={(v) => setAdminForm({...adminForm, barangId: v})} 
                            options={[{value: '', label: '-- Tidak Ada / Kosong --'}, ...barang.map(b => ({value: b.id, label: `${b.nama} (${b.merk || '-'})`}))]} 
                          />
                        )}

                        {/* Input Khusus Tabel Lampiran Pakta */}
                        {adminForm.jenisSurat === 'LAMPIRAN_PAKTA' && (
                          <div className="border-t pt-4 mt-2 space-y-3">
                             <h4 className="text-sm font-bold text-gray-700 mb-2">Data Pengisian Lampiran</h4>
                             <Select 
                                label="Kuasa Pengguna Barang" 
                                value={adminForm.kuasaPenggunaBarangId} 
                                onChange={(v) => setAdminForm({...adminForm, kuasaPenggunaBarangId: v})} 
                                options={[{value: '', label: '-- Pilih Pegawai --'}, ...pegawai.map(p => ({value: p.id, label: p.nama}))]} 
                             />
                             <Select 
                                label="Pengguna Barang" 
                                value={adminForm.penggunaBarangId} 
                                onChange={(v) => setAdminForm({...adminForm, penggunaBarangId: v})} 
                                options={[{value: '', label: '-- Pilih Pegawai --'}, ...pegawai.map(p => ({value: p.id, label: p.nama}))]} 
                             />
                             
                             <div className="p-3 bg-gray-50 border border-gray-200 rounded-lg">
                               <p className="text-xs font-bold text-gray-600 mb-2">BAST Pemakaian (Dok. Sumber)</p>
                               <Input label="Nomor BAST" placeholder="Nomor surat" value={adminForm.bastNomor} onChange={(v) => setAdminForm({...adminForm, bastNomor: v})} />
                               <Input label="Tanggal BAST" type="date" value={adminForm.bastTanggal} onChange={(v) => setAdminForm({...adminForm, bastTanggal: v})} />
                             </div>
                             
                             <div className="p-3 bg-gray-50 border border-gray-200 rounded-lg">
                               <p className="text-xs font-bold text-gray-600 mb-2">Dokumen Pendukung Lainnya</p>
                               <Input label="Nama Dokumen" placeholder="Cth: Surat Jalan" value={adminForm.dokLainNama} onChange={(v) => setAdminForm({...adminForm, dokLainNama: v})} />
                               <Input label="Nomor Dokumen" placeholder="Nomor dokumen" value={adminForm.dokLainNomor} onChange={(v) => setAdminForm({...adminForm, dokLainNomor: v})} />
                               <Input label="Tanggal Dokumen" type="date" value={adminForm.dokLainTanggal} onChange={(v) => setAdminForm({...adminForm, dokLainTanggal: v})} />
                             </div>
                          </div>
                        )}
                      </div>

                      {/* --- Tanda Tangan Digital UI --- */}
                      <div className="mt-6 pt-4 border-t border-gray-200">
                        <h4 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2"><PenTool size={16}/> Tanda Tangan Digital</h4>
                        <div className="grid grid-cols-2 gap-2">
                           <Button variant="secondary" className="text-xs h-10" onClick={() => setSignatureModal({ isOpen: true, target: 'ttdPihak1', title: 'Tanda Tangan Pihak Pertama' })}>
                              + TTD Pihak 1
                           </Button>
                           <Button variant="secondary" className="text-xs h-10" onClick={() => setSignatureModal({ isOpen: true, target: 'ttdPihak2', title: 'Tanda Tangan Pihak Kedua' })}>
                              + TTD Pihak 2
                           </Button>
                        </div>
                        {(adminForm.ttdPihak1 || adminForm.ttdPihak2) && (
                          <div className="mt-3 flex gap-2">
                             {adminForm.ttdPihak1 && <div className="text-xs bg-green-50 text-green-700 px-2 py-1 rounded border border-green-200 flex items-center justify-between w-full"><span>TTD 1 Tersimpan</span> <X size={14} className="cursor-pointer hover:text-red-500" onClick={() => setAdminForm({...adminForm, ttdPihak1: null})}/></div>}
                             {adminForm.ttdPihak2 && <div className="text-xs bg-green-50 text-green-700 px-2 py-1 rounded border border-green-200 flex items-center justify-between w-full"><span>TTD 2 Tersimpan</span> <X size={14} className="cursor-pointer hover:text-red-500" onClick={() => setAdminForm({...adminForm, ttdPihak2: null})}/></div>}
                          </div>
                        )}
                      </div>

                      <div className="mt-6 pt-6 border-t border-gray-200 space-y-3">
                        <Button onClick={handleSaveArsip} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white shadow-md">
                          <Save size={18}/> Simpan ke Arsip
                        </Button>
                        <div className="flex gap-2">
                          <Button onClick={window.print} className="flex-1" variant="success">
                            <Printer size={18}/> Cetak PDF
                          </Button>
                          <Button onClick={exportToWord} className="flex-1 bg-blue-800 hover:bg-blue-900 text-white shadow-md">
                            <FileDown size={18}/> Unduh Word
                          </Button>
                        </div>
                      </div>
                      <p className="text-xs text-gray-500 mt-2 text-center">Gunakan "Save as PDF" di layar cetak.</p>
                    </div>
                  </div>

                  {/* Panel Layout Pratinjau Kertas */}
                  <div className="w-full lg:w-2/3 flex justify-center overflow-x-auto">
                    <div id="surat-content-print" className="bg-white p-8 md:p-12 shadow-xl text-black leading-relaxed" style={{ width: isLandscapeView ? '330mm' : '210mm', minHeight: isLandscapeView ? '210mm' : '297mm', fontFamily: '"Times New Roman", Times, serif', fontSize: '11pt', boxSizing: 'border-box' }}>
                      
                      {/* --- Kop Surat (Disembunyikan jika Lampiran Pakta) --- */}
                      {adminForm.jenisSurat !== 'LAMPIRAN_PAKTA' && (
                        <table style={{ width: '100%', borderBottom: '3px solid black', marginBottom: '20px' }}>
                          <tbody>
                            <tr>
                              <td style={{ width: '100px', textAlign: 'center', paddingBottom: '10px' }}>
                                <img src={adminForm.customLogo || "https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Lambang_Kota_Bandung.svg/150px-Lambang_Kota_Bandung.svg.png"} alt="Logo Instansi" style={{ width: '80px', height: 'auto' }} />
                              </td>
                              <td style={{ textAlign: 'center', paddingBottom: '10px' }}>
                                <strong style={{ fontSize: '16pt', display: 'block', textTransform: 'uppercase' }}>Pemerintah Kota Bandung</strong>
                                <strong style={{ fontSize: '18pt', display: 'block', textTransform: 'uppercase' }}>Sekretariat Daerah</strong>
                                <span style={{ fontSize: '10pt', display: 'block', textTransform: 'uppercase', marginTop: '4px' }}>Jalan Wastukancana No. 2 Telp. 4232338-4232369-4232370 Bandung</span>
                              </td>
                              <td style={{ width: '100px' }}></td>
                            </tr>
                          </tbody>
                        </table>
                      )}

                      {/* --- Template Khusus Pakta Integritas --- */}
                      {adminForm.jenisSurat === 'PAKTA' ? (
                        <>
                          <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                            <strong style={{ fontSize: '14pt', textTransform: 'uppercase', textDecoration: 'underline' }}>Pakta Integritas Barang Milik Daerah</strong>
                          </div>
                          <div style={{ textAlign: 'justify' }}>
                            <p style={{ marginBottom: '15px' }}>Pada Hari Ini <strong>{formatHariIndo(adminForm.tanggal)}</strong> Tanggal <strong>{getTanggalSaja(adminForm.tanggal)}</strong> Bulan <strong>{getBulanSaja(adminForm.tanggal)}</strong> Tahun <strong>{formatTahunIndo(adminForm.tanggal)}</strong></p>
                            
                            <p style={{ marginBottom: '10px' }}>Saya yang bertanda tangan di bawah ini:</p>
                            
                            <table style={{ width: '100%', marginBottom: '15px', marginLeft: '20px' }}>
                              <tbody>
                                <tr><td style={{ width: '100px' }}>Nama</td><td style={{ width: '15px' }}>:</td><td><strong>{selectedPihak1.nama}</strong></td></tr>
                                <tr><td>Jabatan</td><td>:</td><td>{selectedPihak1.jabatan}</td></tr>
                              </tbody>
                            </table>
                            
                            <p style={{ marginBottom: '10px' }}>Dengan ini menyatakan sebagai berikut:</p>
                            
                            <table style={{ width: '100%', marginBottom: '20px' }}>
                              <tbody>
                                <tr>
                                  <td style={{ width: '25px', verticalAlign: 'top' }}>1.</td>
                                  <td style={{ verticalAlign: 'top', textAlign: 'justify' }}>
                                    Bahwa telah menerima dan menggunakan Barang Milik Daerah Untuk Menunjang Tugas Pokok dan Fungsi selaku ASN berupa:
                                    <div style={{ marginTop: '5px', marginBottom: '10px', paddingLeft: '5px' }}>
                                      {allHeldItemsPakta.length > 0 ? (
                                        <ol style={{ listStyleType: 'decimal', margin: 0, paddingLeft: '20px' }}>
                                          {heldKendaraan.map((k, idx) => (
                                            <li key={'k'+idx} style={{ paddingBottom: '4px' }}>
                                              {k.namaKendaraan} (No. Polisi: {k.noKendaraan}, No. Rangka: {k.noRangka || '-'}, No. Mesin: {k.noMesin || '-'})
                                            </li>
                                          ))}
                                          {heldBarangPakta.map((b, idx) => (
                                            <li key={'b'+idx} style={{ paddingBottom: '4px' }}>
                                              {b.nama} {b.merk ? `(${b.merk})` : ''} {b.nomorSeri ? `- SN: ${b.nomorSeri}` : ''}
                                            </li>
                                          ))}
                                        </ol>
                                      ) : (
                                        <ol style={{ listStyleType: 'decimal', margin: 0, paddingLeft: '20px' }}>
                                          <li>.........................................................................................</li>
                                        </ol>
                                      )}
                                    </div>
                                  </td>
                                </tr>
                                <tr>
                                  <td style={{ verticalAlign: 'top' }}>2.</td>
                                  <td style={{ verticalAlign: 'top', textAlign: 'justify', paddingBottom: '8px' }}>Bahwa apabila saya dimutasi dan purna bakti, barang milik daerah tersebut akan dikembalikan ke Perangkat Daerah sesuai dengan status Penggunaannya</td>
                                </tr>
                                <tr>
                                  <td style={{ verticalAlign: 'top' }}>3.</td>
                                  <td style={{ verticalAlign: 'top', textAlign: 'justify', paddingBottom: '8px' }}>Bahwa Pakta Integritas Penyerahan Barang Milik Daerah yang saya tandatangani ini berlaku juga sebagai Surat Kuasa kepada Pengguna Barang untuk menarik kembali secara langsung Barang Milik Daerah tersebut</td>
                                </tr>
                                <tr>
                                  <td style={{ verticalAlign: 'top' }}>4.</td>
                                  <td style={{ verticalAlign: 'top', textAlign: 'justify', paddingBottom: '8px' }}>Bahwa apabila Saya melanggar hal-hal yang Saya nyatakan dalam Pakta Integritas ini, Saya bersedia bertanggung jawab mutlak dan siap dikenakan sanksi sesuai dengan peraturan dan perundang-undangan yang berlaku.</td>
                                </tr>
                              </tbody>
                            </table>
                            
                            <p style={{ marginBottom: '50px' }}>Demikian Pakta Integritas dan Surat Kuasa ini saya buat dengan sebenar-benarnya untuk dipergunakan sebagaimana mestinya.</p>
                            
                            <table style={{ width: '100%', textAlign: 'center' }}>
                              <tbody>
                                <tr>
                                  <td style={{ width: '50%' }}></td>
                                  <td style={{ width: '50%', verticalAlign: 'bottom' }}>
                                    <p style={{ marginBottom: '20px', marginTop: '0' }}>Bandung, {formatTanggalIndo(adminForm.tanggal)}<br/>Yang Membuat Pernyataan dan Pemberi Kuasa</p>
                                    
                                    {/* Merender Tanda Tangan jika ada */}
                                    <div style={{ minHeight: '80px', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '10px' }}>
                                      {adminForm.ttdPihak1 ? <img src={adminForm.ttdPihak1} style={{ height: '80px', objectFit: 'contain' }} /> : null}
                                    </div>

                                    <strong style={{ textDecoration: 'underline' }}>{selectedPihak1.nama}</strong>
                                    <p style={{ marginTop: '5px' }}>NIP. {selectedPihak1.nip}</p>
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                        </>

                      ) : adminForm.jenisSurat === 'LAMPIRAN_PAKTA' ? (

                              <p style={{ marginBottom: '15px' }}>Dengan ini PIHAK PERTAMA {adminForm.jenisSurat === 'PENGEMBALIAN' ? 'telah mengembalikan' : 'mengajukan permohonan'} barang berupa aset daerah kepada {adminForm.jenisSurat === 'PERMOHONAN' ? 'Bagian Pengurus Barang' : 'PIHAK KEDUA'} dengan rincian sebagai berikut:</p>
                              
                              <table border="1" style={{ width: '100%', borderCollapse: 'collapse', marginBottom: '15px', borderColor: 'black' }}>
                                <thead>
                                  <tr>
                                    <th style={{ padding: '8px', textAlign: 'center', width: '40px' }}>No</th>
                                    <th style={{ padding: '8px' }}>Nama / Jenis Barang</th>
                                    <th style={{ padding: '8px', textAlign: 'center' }}>Merk / Tipe</th>
                                    <th style={{ padding: '8px', textAlign: 'center' }}>Tahun / SN</th>
                                    <th style={{ padding: '8px', textAlign: 'center' }}>Kondisi</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {!adminForm.barangId ? (
                                    <tr>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>1</td>
                                      <td style={{ padding: '8px', fontWeight: 'bold' }}>..........................</td>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>..........................</td>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>..........................</td>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>..........................</td>
                                    </tr>
                                  ) : (
                                    <tr>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>1</td>
                                      <td style={{ padding: '8px' }}><strong>{getBarangObj(adminForm.barangId).nama}</strong></td>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>{getBarangObj(adminForm.barangId).merk}</td>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>{getBarangObj(adminForm.barangId).tahun} / {getBarangObj(adminForm.barangId).nomorSeri}</td>
                                      <td style={{ padding: '8px', textAlign: 'center' }}>{getBarangObj(adminForm.barangId).kondisi}</td>
                                    </tr>
                                  )}
                                </tbody>
                              </table>
                              
                              {adminForm.jenisSurat === 'PENGEMBALIAN' && <p style={{ marginBottom: '10px' }}>PIHAK KEDUA menyatakan telah menerima kembali barang tersebut dari PIHAK PERTAMA untuk selanjutnya didata dan dikembalikan ke dalam ruang/gudang penyimpanan aset.</p>}
                              {adminForm.jenisSurat === 'PERMOHONAN' && <p style={{ marginBottom: '10px' }}>Demikian permohonan ini dibuat untuk dapat ditindaklanjuti guna menunjang kelancaran tugas operasional kedinasan di lingkungan Bagian Protokol dan Komunikasi Pimpinan.</p>}
                              {adminForm.jenisSurat !== 'PERMOHONAN' && <p style={{ marginBottom: '10px' }}>Demikian Berita Acara ini dibuat dan ditandatangani oleh kedua belah pihak untuk dapat dipergunakan sebagaimana mestinya.</p>}
                            </div>

                            <table style={{ width: '100%', textAlign: 'center', marginTop: '60px' }}>
                              <tbody>
                                <tr>
                                  <td style={{ width: '50%', verticalAlign: 'bottom' }}>
                                    <p style={{ marginBottom: '20px', marginTop: '0' }}>{adminForm.jenisSurat === 'PENGEMBALIAN' ? 'PIHAK KEDUA' : 'Mengetahui,'}<br/>{adminForm.jenisSurat === 'PERMOHONAN' ? 'Kepala Bagian' : 'Yang Menerima'}</p>
                                    
                                    <div style={{ minHeight: '80px', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '10px' }}>
                                      {adminForm.ttdPihak2 ? <img src={adminForm.ttdPihak2} style={{ height: '80px', objectFit: 'contain' }} /> : null}
                                    </div>

                                    <strong style={{ textDecoration: 'underline' }}>{adminForm.jenisSurat === 'PERMOHONAN' ? '..................................................' : getPegawaiObj(adminForm.pihak2Id).nama}</strong>
                                    <p style={{ marginTop: '5px' }}>NIP. {adminForm.jenisSurat === 'PERMOHONAN' ? '..................................................' : getPegawaiObj(adminForm.pihak2Id).nip}</p>
                                  </td>
                                  <td style={{ width: '50%', verticalAlign: 'bottom' }}>
                                    <p style={{ marginBottom: '20px', marginTop: '0' }}>{adminForm.jenisSurat === 'PENGEMBALIAN' ? 'PIHAK PERTAMA' : 'Pemohon'}<br/>{adminForm.jenisSurat === 'PENGEMBALIAN' ? 'Yang Mengembalikan' : ''}</p>
                                    
                                    <div style={{ minHeight: '80px', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '10px' }}>
                                      {adminForm.ttdPihak1 ? <img src={adminForm.ttdPihak1} style={{ height: '80px', objectFit: 'contain' }} /> : null}
                                    </div>

                                    <strong style={{ textDecoration: 'underline' }}>{getPegawaiObj(adminForm.pihak1Id).nama}</strong>
                                    <p style={{ marginTop: '5px' }}>NIP. {getPegawaiObj(adminForm.pihak1Id).nip}</p>
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
