<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-in { animation-duration: 0.2s; animation-fill-mode: forwards; }
    .fade-in { animation-name: fadeIn; }
    .zoom-in { animation-name: zoomIn; }

    /* Khusus untuk cetak dokumen administrasi (PDF) */
    @media print {
      @page { margin: 0; size: A4 portrait; }
      body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print-hide { display: none !important; }
      .print-doc-area { 
        width: 100% !important; 
        margin: 0 !important; 
        padding: 2cm !important; 
        box-shadow: none !important;
        border: none !important;
        background: transparent !important;
      }
      .page-break { page-break-before: always; }
      /* Kelas khusus untuk halaman lampiran landscape */
      .landscape-page {
        page-break-before: always;
        size: Legal landscape; 
        width: 355mm !important; 
        min-height: 215mm !important; 
        padding: 2cm !important;
      }
    }
  </style>

  <script>
    window.firebaseConfig = {
      apiKey: "AIzaSyDchti2rfVq-rB60754czqevaOaLD0Sh8k",
      authDomain: "e-aset-prokopim.firebaseapp.com",
      projectId: "e-aset-prokopim",
      storageBucket: "e-aset-prokopim.firebasestorage.app",
      messagingSenderId: "820518183082",
      appId: "1:820518183082:web:5fe0054e1dda02648cf0d3"

    window.__app_id = "e-aset-prokopim";
  </script>
</head>
<body class="bg-gray-50 text-gray-800">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { createRoot } from 'react-dom/client';
    import React, { useState, useEffect, useRef } from 'react';
    import { 
      LayoutDashboard, Users, Package, Home, ClipboardList, LogOut, Plus, Search, Trash2, Edit3,
      ChevronRight, UserCircle, FileText, AlertCircle, CheckCircle2, Download, X, Cloud, Info, Car, UserCheck, Filter, FileSignature, Printer, FileDown
    } from 'lucide-react';

    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'firebase/firestore';

    const config = window.firebaseConfig || {};
    const app = Object.keys(config).length > 0 ? initializeApp(config) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const appId = window.__app_id || 'default-app-id';

    const GOOGLE_SHEET_URL = "URL_WEB_APP_GOOGLE_SHEET_ANDA"; 

    // --- UI Components ---
    const Button = ({ children, onClick, variant = 'primary', className = '', type = 'button', disabled = false }) => {
      const base = "px-4 py-2 rounded-lg font-medium transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg",
        secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
        danger: "bg-red-500 text-white hover:bg-red-600",
        success: "bg-emerald-500 text-white hover:bg-emerald-600 shadow-md",
        outline: "border-2 border-blue-600 text-blue-600 hover:bg-blue-50"
      };
      return <button type={type} onClick={onClick} className={`${base} ${variants[variant]} ${className}`} disabled={disabled}>{children}</button>;
    };

    const Card = ({ children, title, subtitle, icon: Icon }) => (
      <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
        <div className="flex items-center justify-between mb-4">
          <div><h3 className="text-gray-500 text-sm font-medium">{title}</h3><p className="text-2xl font-bold text-gray-800">{subtitle}</p></div>
          {Icon && <div className="p-3 bg-blue-50 rounded-lg text-blue-600"><Icon size={24} /></div>}
        </div>
        {children}
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm print-hide">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
              <h3 className="font-bold text-gray-800">{title}</h3>
              <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition-colors text-gray-500"><X size={20} /></button>
            </div>
            <div className="p-6 max-h-[80vh] overflow-y-auto">{children}</div>
          </div>
        </div>
      );
    };

    const Input = ({ label, type = "text", value = "", onChange, placeholder, required = false, min, list, readOnly = false, disabled = false }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-gray-700 mb-1.5">{label}</label>
        <input
          type={type} value={value} min={min} list={list} readOnly={readOnly} disabled={disabled}
          onChange={(e) => onChange && onChange(e.target.value)}
          className={`w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-gray-400 ${disabled ? 'bg-gray-100 cursor-not-allowed' : 'bg-white'}`}
          placeholder={placeholder} required={required}
        />
      </div>
    );

    const Select = ({ label, value, onChange, options, required = false, placeholder = "Pilih" }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-gray-700 mb-1.5">{label}</label>
        <select
          value={value} onChange={(e) => onChange && onChange(e.target.value)}
          className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white transition-all text-sm"
          required={required}
        >
          <option value="" disabled={required}>{placeholder}</option>
          {options.map((opt, idx) => {
            const optValue = typeof opt === 'object' && opt !== null && 'value' in opt ? opt.value : opt;
            const optLabel = typeof opt === 'object' && opt !== null && 'label' in opt ? opt.label : opt;
            return <option key={idx} value={optValue}>{optLabel}</option>;
          })}
        </select>
      </div>
    );

    const useLocalStorage = (key, initialValue) => {
      const [value, setValue] = useState(() => {
        try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : initialValue; } catch (error) { return initialValue; }
      });
      useEffect(() => {
        try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (error) {}
      }, [key, value]);
      return [value, setValue];
    };

    // --- Main App ---
    function App() {
      const [view, setView] = useState('login'); 
      const [user, setUser] = useState(null);
      const [firebaseUser, setFirebaseUser] = useState(null);
      
      const [toast, setToast] = useState(null);
      const [modalType, setModalType] = useState(null); 
      
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
      
      // Global Data
      const [pegawai, setPegawai] = useState([]);
      const [barang, setBarang] = useState([]);
      const [ruangan, setRuangan] = useState([]);
      const [persediaan, setPersediaan] = useState([]);
      const [kendaraan, setKendaraan] = useState([]);
      
      const [registeredUsers, setRegisteredUsers] = useLocalStorage('easet_registered_users', []);

      // Form Data
      const [loginData, setLoginData] = useState({ identifier: '', password: '' });
      const [signupData, setSignupData] = useState({ nama: '', nip: '', jabatan: '', email: '', password: '' });
      
      // Update state dengan KTP & Alamat
      const initialPegawaiState = { nama: '', jabatan: '', nip: '', status: 'PNS', penempatan: 'Bagian Prokopim', ktp: '', alamat: '' };
      const [newPegawai, setNewPegawai] = useState(initialPegawaiState);
      
      // Update state dengan Kode Barang & NIBAR
      const initialBarangState = { 
        tahun: new Date().getFullYear().toString(), 
        kodeBarang: '',
        nibar: '',
        nama: '', 
        merk: '', 
        nomorSeri: '', 
        kondisi: 'Baik', 
        status: 'Baru', 
        lokasi: '', 
        peminjamNama: '', 
        peminjamNip: '', 
        peminjamJabatan: '', 
        lokasiSaatIni: '',
        foto: '' 
      };
      const [barangData, setBarangData] = useState(initialBarangState);
      const [groupByBarang, setGroupByBarang] = useState('');

      const [ruanganData, setRuanganData] = useState({ id: null, nama: '', foto: '', items: [] });
      const [tempRuanganItem, setTempRuanganItem] = useState({ nama: '', jumlah: 1, kondisi: 'Baik' });

      const initialPersediaanState = { kode: '', namaRekening: '', nama: '', satuan: '', saldoAwal: 0, penambahan: 0, pengeluaran: 0, hargaSatuan: 0 };
      const [persediaanData, setPersediaanData] = useState(initialPersediaanState);
      const [stokData, setStokData] = useState({ idBarang: '', jenisTransaksi: 'Penambahan', jumlah: 1 });

      const initialKendaraanState = { id: null, pemegang: '', nip: '', jabatan: '', noKendaraan: '', tahun: new Date().getFullYear().toString(), noRangka: '', noMesin: '', jenis: 'Roda 4 (Mobil)', namaKendaraan: '', tanggalPajak: '', kondisi: 'Baik' };
      const [kendaraanData, setKendaraanData] = useState(initialKendaraanState);

      const [selectedPegawai, setSelectedPegawai] = useState(null);
      const [assignBarangId, setAssignBarangId] = useState('');
      const [searchBarangAssign, setSearchBarangAssign] = useState('');
      const fileInputRef = useRef(null);

      // --- Administrasi Form State ---
      const [adminForm, setAdminForm] = useState({
        jenisSurat: 'PAKTA', // Default
        tanggal: new Date().toISOString().split('T')[0],
        customLogo: '',
        pihak1Id: '', // Pihak Pertama (Biasanya Yang Menyerahkan/Pengurus Barang)
        pihak2Id: '', // Pihak Kedua (Yang Menerima)
        barangId: '', 
        kendaraanId: '',
        nomorSurat: '027/     /Prokopim/2026',
        referensiSurat: '',
        kuasaPenggunaBarangId: '', // Terintegrasi dgn Pegawai
        penggunaBarangId: '', // Terintegrasi dgn Pegawai
        alamat: '',
        bastNomor: '',
        bastTanggal: '',
        dokLainNama: '',
        dokLainNomor: '',
        dokLainTanggal: ''
      });

      const formatTanggalIndo = (tgl) => {
        if (!tgl) return '..........................';
        const date = new Date(tgl);
        return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
      };
      
      const getTanggalSaja = (tgl) => {
         if (!tgl) return '.........';
         return new Date(tgl).getDate();
      }

      const getBulanSaja = (tgl) => {
         if (!tgl) return '.........';
         return new Date(tgl).toLocaleDateString('id-ID', { month: 'long' });
      }

      const formatHariIndo = (tgl) => {
        if (!tgl) return '...........';
        return new Date(tgl).toLocaleDateString('id-ID', { weekday: 'long' });
      };
      
      const formatTahunIndo = (tgl) => {
        if (!tgl) return '...........';
        return new Date(tgl).getFullYear();
      };

      const getPegawaiObj = (id) => pegawai.find(p => p.id === id) || { nama: '..........................', nip: '..........................', jabatan: '..........................', ktp: '', alamat: '' };
      const getBarangObj = (id) => barang.find(b => b.id === id) || { nama: '..........................', merk: '..........................', nomorSeri: '..........................', kondisi: '..........................' };
      const getKendaraanObj = (id) => kendaraan.find(k => k.id === id) || { namaKendaraan: '..........................', noKendaraan: '..........................', noRangka: '..........................', noMesin: '..........................', tahun: '..........................', jenis: 'Roda 4' };

      // Helper Khusus Pakta Integritas & BAST (Auto-fill Aset berdasarkan Pegawai Pihak 2/Pihak 1)
      const selectedPihak1 = getPegawaiObj(adminForm.pihak1Id);
      const selectedPihak2 = getPegawaiObj(adminForm.pihak2Id);
      
      // Auto-detect berdasarkan Pihak 2 (Yang Menerima / Pemakai) untuk BAST, tapi untuk Pakta biasanya Pihak 1 yang digunakan.
      // Kita gabungkan logikanya, jika surat lampiran pakta gunakan pihak 1, jika BAST gunakan pihak 2.
      const targetPihak = adminForm.jenisSurat === 'LAMPIRAN_PAKTA' || adminForm.jenisSurat === 'PAKTA' ? selectedPihak1 : selectedPihak2;

      const heldKendaraan = kendaraan.filter(k => k.pemegang === targetPihak.nama || k.nip === targetPihak.nip);
      const heldBarang = barang.filter(b => b.peminjamNama === targetPihak.nama || b.peminjamNip === targetPihak.nip);
      const allHeldItems = [...heldKendaraan.map(k => ({...k, isKendaraan: true})), ...heldBarang.map(b => ({...b, isKendaraan: false}))];

      const kuasaObj = getPegawaiObj(adminForm.kuasaPenggunaBarangId);
      const penggunaObj = getPegawaiObj(adminForm.penggunaBarangId);

      // --- Firebase Init ---
      useEffect(() => {
        if (!auth) return;
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setFirebaseUser(u);
          if (u) {
            setUser({ name: u.email });
            if (view === 'login' || view === 'signup') setView('dashboard');
          }
        });
        return () => unsubscribe();
      }, [auth, view]);

      useEffect(() => {
        if (!firebaseUser || !db) return;
        const collections = ['pegawai', 'barang', 'ruangan', 'persediaan', 'kendaraan'];
        const unsubscribes = collections.map(colName => {
          const colRef = collection(db, 'artifacts', appId, 'users', firebaseUser.uid, colName);
          return onSnapshot(colRef, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
            if (colName === 'pegawai') setPegawai(data);
            if (colName === 'barang') setBarang(data);
            if (colName === 'ruangan') setRuangan(data);
            if (colName === 'persediaan') setPersediaan(data);
            if (colName === 'kendaraan') setKendaraan(data);
          }, (error) => console.error(error));
        });
        return () => unsubscribes.forEach(unsub => unsub());
      }, [firebaseUser]);

      const showToast = (message) => { setToast(message); setTimeout(() => setToast(null), 3000); };
      const askConfirm = (message, action) => { setConfirmDialog({ isOpen: true, message, onConfirm: action }); };

      const saveToDb = async (colName, id, data) => {
        if (!firebaseUser || !db) {
           if(colName === 'pegawai') setPegawai(prev => { const idx = prev.findIndex(p => p.id === id); return idx >= 0 ? prev.map(p => p.id === id ? data : p) : [...prev, data] });
           if(colName === 'barang') setBarang(prev => { const idx = prev.findIndex(p => p.id === id); return idx >= 0 ? prev.map(p => p.id === id ? data : p) : [...prev, data] });
           if(colName === 'ruangan') setRuangan(prev => { const idx = prev.findIndex(p => p.id === id); return idx >= 0 ? prev.map(p => p.id === id ? data : p) : [...prev, data] });
           if(colName === 'persediaan') setPersediaan(prev => { const idx = prev.findIndex(p => p.id === id); return idx >= 0 ? prev.map(p => p.id === id ? data : p) : [...prev, data] });
           if(colName === 'kendaraan') setKendaraan(prev => { const idx = prev.findIndex(p => p.id === id); return idx >= 0 ? prev.map(p => p.id === id ? data : p) : [...prev, data] });
           return;
        }
        const docRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, colName, id.toString());
        await setDoc(docRef, data);
      };

      const deleteFromDb = async (colName, id) => {
        if (!firebaseUser || !db) {
           if(colName === 'pegawai') setPegawai(prev => prev.filter(p => p.id !== id));
           if(colName === 'barang') setBarang(prev => prev.filter(p => p.id !== id));
           if(colName === 'ruangan') setRuangan(prev => prev.filter(p => p.id !== id));
           if(colName === 'persediaan') setPersediaan(prev => prev.filter(p => p.id !== id));
           if(colName === 'kendaraan') setKendaraan(prev => prev.filter(p => p.id !== id));
           return;
        }
        const docRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, colName, id.toString());
        await deleteDoc(docRef);
      };

      // --- Handlers ---
      const handleLogin = async (e) => {
        e.preventDefault();
        const checkLocalAuth = () => {
          const isExist = registeredUsers.find(u => u.email === loginData.identifier && u.password === loginData.password);
          if (isExist) { setUser({ name: isExist.nama }); setView('dashboard'); } 
          else { showToast("Gagal masuk: Email atau password salah."); }
        };
        try {
          if (auth) {
            try { await signInWithEmailAndPassword(auth, loginData.identifier, loginData.password); return; } 
            catch (fbError) { checkLocalAuth(); }
          } else { checkLocalAuth(); }
        } catch (error) { showToast("Terjadi kesalahan sistem login."); }
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setRegisteredUsers([...registeredUsers, signupData]);
        if (GOOGLE_SHEET_URL && GOOGLE_SHEET_URL !== "URL_WEB_APP_GOOGLE_SHEET_ANDA") {
          fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(signupData) }).catch(e => console.log(e));
        }
        if (auth) {
          try {
            await createUserWithEmailAndPassword(auth, signupData.email, signupData.password);
            showToast("Registrasi berhasil!");
            setSignupData({ nama: '', nip: '', jabatan: '', email: '', password: '' });
            return; 
          } catch (error) { showToast("Gagal Registrasi Cloud, dialihkan ke lokal."); }
        }
        showToast("Registrasi berhasil (Mode Lokal).");
        setUser({ name: signupData.nama });
        setSignupData({ nama: '', nip: '', jabatan: '', email: '', password: '' });
        setView('dashboard');
      };

      const handleForgotPassword = async () => {
        if (!loginData.identifier) { showToast("Mohon masukkan Email Aktif Anda di kolom Email terlebih dahulu!"); return; }
        if (auth) {
          try { await sendPasswordResetEmail(auth, loginData.identifier); showToast("Link reset password telah dikirim ke email Anda!"); } 
          catch (error) { showToast("Gagal mengirim link reset password. Pastikan email terdaftar."); }
        } else { showToast("Fitur reset password tidak aktif di Mode Lokal."); }
      };

      const handleLogout = async () => {
        if (auth) { try { await signOut(auth); } catch(err) {} }
        setUser(null); setView('login');
      };

      const handleSavePegawai = async (e) => {
        e.preventDefault(); const id = newPegawai.id || Date.now().toString();
        await saveToDb('pegawai', id, { ...newPegawai, id }); showToast(newPegawai.id ? "Data Pegawai Diperbarui" : "Pegawai Ditambahkan"); setModalType(null);
      };

      const handleSaveBarang = async (e) => {
        e.preventDefault(); const id = barangData.id || Date.now().toString();
        await saveToDb('barang', id, { ...barangData, id }); showToast(barangData.id ? "Data Barang Diperbarui" : "Barang Ditambahkan"); setModalType(null);
      };

      const handleAddRuanganItem = () => {
        if(!tempRuanganItem.nama || tempRuanganItem.jumlah < 1) return;
        setRuanganData({ ...ruanganData, items: [...(ruanganData.items || []), { ...tempRuanganItem, id: Date.now().toString() }] });
        setTempRuanganItem({ nama: '', jumlah: 1, kondisi: 'Baik' });
      };

      const handleRemoveRuanganItem = (itemId) => { setRuanganData({ ...ruanganData, items: (ruanganData.items || []).filter(item => item.id !== itemId) }); };

      const handleSaveRuangan = async (e) => {
        e.preventDefault(); const id = ruanganData.id || Date.now().toString();
        await saveToDb('ruangan', id, { ...ruanganData, id }); showToast("Inventaris Ruangan Disimpan"); setModalType(null);
      };

      const handleSaveStok = async (e) => {
        e.preventDefault(); if (!stokData.idBarang) return;
        const target = persediaan.find(p => p.id.toString() === stokData.idBarang.toString());
        if (target) {
          const qty = parseInt(stokData.jumlah); const payload = { ...target };
          if (stokData.jenisTransaksi === 'Penambahan') payload.penambahan += qty; else payload.pengeluaran += qty;
          await saveToDb('persediaan', target.id, payload); setModalType(null); showToast(`Stok berhasil diupdate`);
        }
      };

      const handleSavePersediaan = async (e) => {
        e.preventDefault(); const id = persediaanData.id || Date.now().toString();
        await saveToDb('persediaan', id, { ...persediaanData, id, saldoAwal: parseInt(persediaanData.saldoAwal)||0, penambahan: parseInt(persediaanData.penambahan)||0, pengeluaran: parseInt(persediaanData.pengeluaran)||0, hargaSatuan: parseInt(persediaanData.hargaSatuan)||0 });
        showToast("Data Persediaan Disimpan"); setModalType(null);
      };

      const handleSaveKendaraan = async (e) => {
        e.preventDefault(); const id = kendaraanData.id || Date.now().toString();
        await saveToDb('kendaraan', id, { ...kendaraanData, id }); showToast("Data Kendaraan Disimpan"); setModalType(null);
      };

      const handleAssignBarang = async () => {
        if(!assignBarangId || !selectedPegawai) return;
        const b = barang.find(x => x.id === assignBarangId);
        if(b) { await saveToDb('barang', b.id, {...b, peminjamNama: selectedPegawai.nama, peminjamNip: selectedPegawai.nip, peminjamJabatan: selectedPegawai.jabatan, status: 'Dipinjamkan'}); showToast('Aset diserahkan'); setAssignBarangId(''); }
      };

      const handleUnassignBarang = async (b) => { await saveToDb('barang', b.id, {...b, status: 'Aktif', peminjamNama: '', peminjamNip: '', peminjamJabatan: ''}); showToast('Aset ditarik kembali'); };

      // --- Media & Utilities ---
      const handleImageCompress = (file, callback) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas'); const MAX_WIDTH = 600; let scaleSize = 1;
            if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
            canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            callback(canvas.toDataURL('image/jpeg', 0.6));
          }
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleImportExcelBarang = (e) => {
        const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const bstr = evt.target.result; const wb = window.XLSX.read(bstr, { type: 'binary' }); const ws = wb.Sheets[wb.SheetNames[0]]; const data = window.XLSX.utils.sheet_to_json(ws);
            let count = 0;
            for (const row of data) {
              if (row['Nama Barang']) {
                const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                await saveToDb('barang', id, {
                  id, 
                  kodeBarang: row['Kode Barang'] || '',
                  nibar: row['NIBAR'] || row['Nomor Induk Barang'] || '',
                  nama: row['Nama Barang'] || '', 
                  merk: row['Merk/Type'] || '', 
                  nomorSeri: row['Nomor Seri'] || '',
                  tahun: row['Tahun'] || new Date().getFullYear().toString(), 
                  kondisi: row['Kondisi'] || 'Baik',
                  lokasi: row['Lokasi'] || '', 
                  status: row['Status'] || 'Baru', 
                  peminjamNama: '', 
                  foto: ''
                }); count++;
              }
            }
            showToast(`${count} Barang berhasil diimpor!`); e.target.value = null;
          } catch (err) { showToast("Gagal membaca file Excel."); }
        };
        reader.readAsBinaryString(file);
      };

      const downloadTemplateExcelBarang = () => {
        const ws = window.XLSX.utils.json_to_sheet([{"Kode Barang": "2.1.3.01.01", "NIBAR": "001", "Nama Barang": "Laptop", "Merk/Type": "Asus", "Nomor Seri": "SN123", "Tahun": "2023", "Kondisi": "Baik", "Lokasi": "Gudang", "Status": "Baru"}]);
        const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, "Template"); window.XLSX.writeFile(wb, "Template_Barang.xlsx");
      };
      
      const exportToWord = () => {
        const element = document.getElementById('surat-content-print');
        if (!element) return;
        
        const clone = element.cloneNode(true);
        const isLandscape = adminForm.jenisSurat === 'LAMPIRAN_PAKTA';
        // Menyisipkan gaya khusus MSO Word untuk landscape jika itu lampiran
        const landscapeStyle = isLandscape ? `<style>@page WordSection1 { size: 13in 8.5in; mso-page-orientation: landscape; margin: 0.5in; } div.WordSection1 { page: WordSection1; }</style>` : '';
        const wrapOpen = isLandscape ? `<div class="WordSection1">` : `<div>`;
        
        const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML to Word</title><style>body { font-family: 'Times New Roman', serif; } table { border-collapse: collapse; } </style>${landscapeStyle}</head><body>${wrapOpen}`;
        const footer = `</div></body></html>`;
        const sourceHTML = header + clone.innerHTML + footer;
        const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
        
        const url = URL.createObjectURL(blob);
        const filename = `Dokumen_${adminForm.jenisSurat}_${adminForm.tanggal}.doc`;
        
        const fileDownload = document.createElement("a");
        document.body.appendChild(fileDownload);
        fileDownload.href = url;
        fileDownload.download = filename;
        fileDownload.click();
        document.body.removeChild(fileDownload);
        URL.revokeObjectURL(url);
        
        showToast("Berhasil mengunduh dokumen Word!");
      };

      const renderBarangRows = (items) => {
        return items.map(b => (
          <tr key={b.id} className="hover:bg-gray-50 transition-colors print:break-inside-avoid">
            <td className="px-3 py-2 print-hide">{b.foto ? <img src={b.foto} className="w-10 h-10 object-cover rounded border" /> : <div className="w-10 h-10 bg-gray-100 border flex items-center justify-center text-[10px] text-gray-400">Kosong</div>}</td>
            <td className="px-3 py-2 text-xs">
              <p className="font-bold text-gray-800">{b.nama}</p>
              {b.nomorSeri && <p className="text-[10px] text-gray-500 font-mono mt-0.5">SN: {b.nomorSeri}</p>}
              {(b.kodeBarang || b.nibar) && <p className="text-[10px] text-blue-600 font-mono mt-0.5">Kode: {b.kodeBarang || '-'} | NIBAR: {b.nibar || '-'}</p>}
            </td>
            <td className="px-3 py-2 text-center text-xs">{b.tahun}</td>
            <td className="px-3 py-2 text-xs"><span className={`px-2 py-1 rounded text-[10px] font-bold ${b.kondisi === 'Baik' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{b.kondisi}</span></td>
            <td className="px-3 py-2 text-xs"><p className="font-medium text-gray-800">{b.merk || '-'}</p><p className="text-[10px] text-gray-500">Lokasi: {b.lokasi || '-'}</p></td>
            <td className="px-3 py-2 text-xs">
              <span className={`font-medium ${b.status === 'Dipinjamkan' ? 'text-orange-600' : 'text-blue-600'}`}>{b.status}</span>
              {/* Jika berstatus dipinjamkan, maka akan menampilkan peminjam dan lokasi terkininya */}
              {b.status === 'Dipinjamkan' && b.peminjamNama ? (
                  <div className="mt-1 text-[10px] text-gray-500 border-t pt-1"><p className="font-bold">Peminjam:</p><p className="truncate max-w-[120px]">{b.peminjamNama}</p>{b.lokasiSaatIni && <p className="truncate max-w-[120px]">Di: {b.lokasiSaatIni}</p>}</div>
              ) : (
                /* Jika tidak, namun memiliki pemegang dari menu "Pemegang Aset", maka tampilkan Pemegang */
                b.peminjamNama && <div className="mt-1 text-[10px] text-gray-500 border-t pt-1"><p className="font-bold">Pemegang:</p><p className="truncate max-w-[120px]">{b.peminjamNama}</p></div>
              )}
            </td>
            <td className="px-3 py-2 print-hide text-xs">
              <div className="flex gap-1">
                <button className="p-1.5 text-blue-600 hover:bg-blue-50 rounded" onClick={() => { setBarangData(b); setModalType('barang'); }}><Edit3 size={14} /></button>
                <button className="p-1.5 text-red-500 hover:bg-red-50 rounded" onClick={() => { if(window.confirm('Yakin menghapus aset ini?')) deleteFromDb('barang', b.id); }}><Trash2 size={14} /></button>
              </div>
            </td>
          </tr>
        ));
      };

      // --- Stats ---
      const statusPNS = pegawai.filter(p => p.status === 'PNS').length; 
      const statusPPPK = pegawai.filter(p => p.status === 'PPPK').length; 
      const statusPPPKPW = pegawai.filter(p => p.status === 'PPPK PW').length;
      const statusOutsourcing = pegawai.filter(p => p.status === 'Outsourcing').length;
      
      const pProkopim = pegawai.filter(p => p.penempatan === 'Bagian Prokopim').length; const pProtokol = pegawai.filter(p => p.penempatan === 'Sub Bagian Protokol').length; const pKomunikasi = pegawai.filter(p => p.penempatan === 'Sub Bagian Komunikasi Pimpinan').length; const pDokumentasi = pegawai.filter(p => p.penempatan === 'Sub Bagian Dokumentasi Pimpinan').length;
      const kRoda2 = kendaraan.filter(k => k.jenis && k.jenis.includes('Roda 2')).length; const kRoda4 = kendaraan.filter(k => k.jenis && k.jenis.includes('Roda 4')).length;

      // --- Setup Print Variables ---
      const isLandscapeView = adminForm.jenisSurat === 'LAMPIRAN_PAKTA';

      const SidebarItem = ({ id, icon: Icon, label }) => (
        <button onClick={() => setView(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200 print-hide ${view === id ? "bg-blue-600 text-white shadow-md" : "text-gray-500 hover:bg-blue-50 hover:text-blue-600"}`}>
          <Icon size={20} /><span className="font-medium">{label}</span>
        </button>
      );

      // --- Login & Signup Views ---
      if (view === 'login') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            {toast && <div className="fixed top-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 z-50 animate-in fade-in"><Info className="text-blue-400" size={20} /><span className="font-medium">{toast}</span></div>}
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
              <div className="text-center mb-8"><div className="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><Package className="text-white" size={40} /></div><h1 className="text-xl font-bold text-gray-800 leading-snug">E-Aset Prokopim</h1><p className="text-gray-500 text-sm mt-2 leading-relaxed">Sistem Informasi Aset<br/>Bagian Protokol dan Komunikasi Pimpinan</p></div>
              <form onSubmit={handleLogin}>
                <Input label="Email Aktif" type="text" placeholder="contoh@email.com" value={loginData.identifier} onChange={(val) => setLoginData({...loginData, identifier: val})} required />
                <Input label="Password" type="password" placeholder="••••••••" value={loginData.password} onChange={(val) => setLoginData({...loginData, password: val})} required />
                <div className="text-right mb-4"><button type="button" onClick={handleForgotPassword} className="text-sm text-blue-600 hover:underline">Lupa Password?</button></div>
                <Button type="submit" className="w-full">Login</Button>
              </form>
              <div className="mt-6 text-center text-sm text-gray-500">Belum punya akun? <button type="button" onClick={() => setView('signup')} className="text-blue-600 font-bold hover:underline">Registrasi</button></div>
            </div>
          </div>
        );
      }

      if (view === 'signup') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 max-h-[95vh] overflow-y-auto">
              <div className="text-center mb-6"><h1 className="text-xl font-bold text-gray-800">Registrasi Akun Baru</h1><p className="text-gray-500 text-sm mt-1">E-Aset Prokopim</p></div>
              <form onSubmit={handleSignup}>
                <Input label="Nama Lengkap" value={signupData.nama} onChange={(val) => setSignupData({...signupData, nama: val})} required />
                <Input label="NIP" value={signupData.nip} onChange={(val) => setSignupData({...signupData, nip: val})} required />
                <Input label="Jabatan" value={signupData.jabatan} onChange={(val) => setSignupData({...signupData, jabatan: val})} required />
                <Input label="Email Aktif" type="email" placeholder="contoh@email.com" value={signupData.email} onChange={(val) => setSignupData({...signupData, email: val})} required />
                <Input label="Password" type="password" placeholder="Minimal 6 Karakter" minLength="6" value={signupData.password} onChange={(val) => setSignupData({...signupData, password: val})} required />
                <Button type="submit" className="w-full mt-6">Registrasi</Button>
              </form>
              <div className="mt-6 text-center text-sm text-gray-500">Sudah punya akun? <button type="button" onClick={() => setView('login')} className="text-blue-600 font-bold hover:underline">Login</button></div>
            </div>
          </div>
        );
      }

      // --- Main Layout ---
      return (
        <div className="flex min-h-screen bg-gray-50 text-gray-800 font-sans print:bg-white relative">
          {toast && <div className="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 z-50 animate-in slide-in-from-bottom-5 print-hide"><CheckCircle2 className="text-green-400" size={20} /><span className="font-medium">{toast}</span></div>}
          
          {/* Inject dynamic CSS untuk printing landscape F4 jika menu Lampiran dipilih */}
          {isLandscapeView && (
            <style>{`
              @media print {
                @page { size: legal landscape !important; margin: 10mm; }
                #surat-content-print { width: 100% !important; padding: 0 !important; }
              }
            `}</style>
          )}

          {/* Modals Data Dasar */}
          <Modal isOpen={modalType === 'pegawai'} onClose={() => setModalType(null)} title={newPegawai.id ? "Edit Pegawai" : "Tambah Pegawai Baru"}>
            <form onSubmit={handleSavePegawai}>
              <Input label="Nama Lengkap" value={newPegawai.nama} onChange={(val) => setNewPegawai({...newPegawai, nama: val})} required />
              <Input label="Jabatan" value={newPegawai.jabatan} onChange={(val) => setNewPegawai({...newPegawai, jabatan: val})} required />
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <Input label="NIP" value={newPegawai.nip} onChange={(val) => setNewPegawai({...newPegawai, nip: val})} required />
                <Input label="Nomor KTP" value={newPegawai.ktp || ''} onChange={(val) => setNewPegawai({...newPegawai, ktp: val})} />
              </div>
              <Input label="Alamat Lengkap" value={newPegawai.alamat || ''} onChange={(val) => setNewPegawai({...newPegawai, alamat: val})} />
              <Select label="Status" value={newPegawai.status} onChange={(val) => setNewPegawai({...newPegawai, status: val})} options={['PNS', 'PPPK', 'PPPK PW', 'Outsourcing']} required />
              <Select label="Penempatan" value={newPegawai.penempatan} onChange={(val) => setNewPegawai({...newPegawai, penempatan: val})} options={['Bagian Prokopim', 'Sub Bagian Protokol', 'Sub Bagian Komunikasi Pimpinan', 'Sub Bagian Dokumentasi Pimpinan']} required />
              <Button type="submit" className="w-full mt-4">Simpan Data Pegawai</Button>
            </form>
          </Modal>

          <Modal isOpen={modalType === 'barang'} onClose={() => setModalType(null)} title={barangData.id ? "Edit Aset Barang" : "Tambah Aset Barang Baru"}>
            <form onSubmit={handleSaveBarang}>
              <div className="mb-4"><label className="block text-sm font-semibold text-gray-700 mb-1.5">Foto Barang (Opsional)</label><input type="file" accept="image/*" onChange={(e) => handleImageCompress(e.target.files[0], (url) => setBarangData({...barangData, foto: url}))} className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white text-sm" /></div>
              <Input label="Nama Barang" value={barangData.nama} onChange={(val) => setBarangData({...barangData, nama: val})} required />
              
              <div className="grid grid-cols-2 gap-4">
                <Input label="Kode Barang" value={barangData.kodeBarang || ''} onChange={(val) => setBarangData({...barangData, kodeBarang: val})} placeholder="Cth: 2.1.3.01.01" />
                <Input label="NIBAR (Nomor Induk Barang)" value={barangData.nibar || ''} onChange={(val) => setBarangData({...barangData, nibar: val})} placeholder="Cth: 001.2023" />
              </div>

              <div className="grid grid-cols-2 gap-4"><Input label="Merk/Type" value={barangData.merk} onChange={(val) => setBarangData({...barangData, merk: val})} placeholder="Cth: Asus Vivobook" /><Input label="Nomor Seri (SN) - Opsional" value={barangData.nomorSeri} onChange={(val) => setBarangData({...barangData, nomorSeri: val})} placeholder="Cth: SN-12345" /></div>
              <div className="grid grid-cols-2 gap-4"><Input label="Tahun Perolehan" type="number" value={barangData.tahun} onChange={(val) => setBarangData({...barangData, tahun: val})} required /><Select label="Kondisi" value={barangData.kondisi} onChange={(val) => setBarangData({...barangData, kondisi: val})} options={['Baik', 'Rusak Ringan', 'Rusak Berat']} required /></div>
              <div className="grid grid-cols-2 gap-4">
                <Select label="Status" value={barangData.status} onChange={(val) => setBarangData({...barangData, status: val, peminjamNama: '', peminjamNip: '', peminjamJabatan: '', lokasiSaatIni: ''})} options={['Baru', 'Aktif', 'Dipinjamkan', 'Maintenance', 'Dihapuskan']} required />
                <Select label="Lokasi Penyimpanan Barang" value={barangData.lokasi} onChange={(val) => setBarangData({...barangData, lokasi: val})} options={['Gudang', 'Ruang Dokumentasi Pimpinan', 'Ruang Komunikasi Pimpinan', 'Ruang Protokol', 'Ruang Kepala Bagian', 'Ruang Rapat', 'Ruang Resepsionis', 'Dapur', 'Kamar Mandi', 'Mushola', 'Ruang Tengah', 'Rumah']} required placeholder="Pilih Lokasi" />
              </div>
              
              <Select label="Pegawai Pemegang Barang (Opsional)" value={barangData.peminjamNama} onChange={(val) => { const pg = pegawai.find(p => p.nama === val); setBarangData({...barangData, peminjamNama: val, peminjamNip: pg?pg.nip:'', peminjamJabatan: pg?pg.jabatan:''}); }} options={[{value: '', label: '-- Kosong / Tidak Ada --'}, ...pegawai.map(p => ({value: p.nama, label: p.nama}))]} />

              {barangData.status === 'Dipinjamkan' && (
                <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 mb-4 animate-in fade-in zoom-in duration-300">
                  <h4 className="font-bold text-sm text-orange-800 mb-3">Informasi Peminjam</h4>
                  <Input label="Nama Peminjam" value={barangData.peminjamNama} onChange={(val) => setBarangData({...barangData, peminjamNama: val})} placeholder="Masukkan nama" required />
                  <div className="grid grid-cols-2 gap-4">
                    <Input label="NIP Peminjam" value={barangData.peminjamNip} onChange={(val) => setBarangData({...barangData, peminjamNip: val})} placeholder="Masukkan NIP" />
                    <Input label="Jabatan Peminjam" value={barangData.peminjamJabatan} onChange={(val) => setBarangData({...barangData, peminjamJabatan: val})} placeholder="Masukkan jabatan" />
                  </div>
                  <Input label="Lokasi Barang Saat Ini (Digunakan Di Mana?)" value={barangData.lokasiSaatIni} onChange={(val) => setBarangData({...barangData, lokasiSaatIni: val})} placeholder="Cth: Dibawa Dinas Luar / Subbag Protokol" required />
                </div>
              )}
              <Button type="submit" className="w-full mt-4">Simpan Data Aset</Button>
            </form>
          </Modal>

          <Modal isOpen={modalType === 'ruangan'} onClose={() => setModalType(null)} title={ruanganData.id ? "Edit Inventaris Ruangan" : "Tambah Inventaris Ruangan"}>
            <form onSubmit={handleSaveRuangan}>
              <Input label="Nama Ruangan" value={ruanganData.nama} onChange={(val) => setRuanganData({...ruanganData, nama: val})} required />
              <div className="mb-4"><label className="block text-sm font-semibold text-gray-700 mb-1.5">Foto Ruangan (Opsional)</label><input type="file" accept="image/*" onChange={(e) => handleImageCompress(e.target.files[0], (url) => setRuanganData({...ruanganData, foto: url}))} className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white text-sm" /></div>
              <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6">
                <label className="block text-sm font-bold text-gray-700 mb-3">Daftar Barang dalam Ruangan</label>
                <div className="grid grid-cols-12 gap-2 mb-4 items-end"><div className="col-span-5"><Input label="Barang" value={tempRuanganItem.nama} onChange={(val) => setTempRuanganItem({...tempRuanganItem, nama: val})} /></div><div className="col-span-2"><Input label="Jml" type="number" min="1" value={tempRuanganItem.jumlah} onChange={(val) => setTempRuanganItem({...tempRuanganItem, jumlah: val})} /></div><div className="col-span-3"><Select label="Kondisi" value={tempRuanganItem.kondisi} onChange={(val) => setTempRuanganItem({...tempRuanganItem, kondisi: val})} options={['Baik', 'Rusak Ringan', 'Rusak Berat']} /></div><div className="col-span-2 pb-4"><Button variant="secondary" onClick={handleAddRuanganItem} className="w-full h-11"><Plus size={16}/></Button></div></div>
                {ruanganData.items && ruanganData.items.length > 0 && <div className="border border-gray-200 rounded-lg bg-white"><table className="w-full text-sm text-left"><thead className="bg-gray-100"><tr><th className="px-4 py-2">Barang</th><th className="px-4 py-2">Jml</th><th className="px-4 py-2">Kondisi</th><th></th></tr></thead><tbody>{ruanganData.items.map(item => <tr key={item.id} className="border-t"><td className="px-4 py-2">{item.nama}</td><td className="px-4 py-2">{item.jumlah}</td><td className="px-4 py-2">{item.kondisi}</td><td className="px-4 py-2"><button type="button" onClick={() => handleRemoveRuanganItem(item.id)} className="text-red-500"><Trash2 size={14}/></button></td></tr>)}</tbody></table></div>}
              </div>
              <Button type="submit" className="w-full mt-4">Simpan Ruangan</Button>
            </form>
          </Modal>

          <Modal isOpen={modalType === 'stok'} onClose={() => setModalType(null)} title="Update Stok Persediaan">
            <form onSubmit={handleSaveStok}>
              <Select label="Barang Persediaan" value={stokData.idBarang} onChange={(val) => setStokData({...stokData, idBarang: val})} options={persediaan.map(p => ({ label: `${p.kode} - ${p.nama}`, value: p.id }))} required />
              <div className="grid grid-cols-2 gap-4"><Select label="Jenis Transaksi" value={stokData.jenisTransaksi} onChange={(val) => setStokData({...stokData, jenisTransaksi: val})} options={['Penambahan', 'Pengeluaran']} required /><Input label="Jumlah" type="number" min="1" value={stokData.jumlah} onChange={(val) => setStokData({...stokData, jumlah: val})} required /></div>
              <Button type="submit" className="w-full mt-2">Simpan Update Stok</Button>
            </form>
          </Modal>

          <Modal isOpen={modalType === 'persediaan_form'} onClose={() => setModalType(null)} title={persediaanData.id ? "Edit Persediaan" : "Tambah Persediaan"}>
            <form onSubmit={handleSavePersediaan}>
              <div className="grid grid-cols-2 gap-4"><Input label="Kode Rekening" value={persediaanData.kode} onChange={(val) => setPersediaanData({...persediaanData, kode: val})} required /><Input label="Nama Rekening" value={persediaanData.namaRekening} onChange={(val) => setPersediaanData({...persediaanData, namaRekening: val})} required /></div>
              <div className="grid grid-cols-2 gap-4"><Input label="Nama Barang" value={persediaanData.nama} onChange={(val) => setPersediaanData({...persediaanData, nama: val})} required /><Input label="Satuan" value={persediaanData.satuan} onChange={(val) => setPersediaanData({...persediaanData, satuan: val})} required /></div>
              <div className="grid grid-cols-2 gap-4"><Input label="Saldo Awal" type="number" min="0" value={persediaanData.saldoAwal} onChange={(val) => setPersediaanData({...persediaanData, saldoAwal: val})} required /><Input label="Harga Satuan (Rp)" type="number" min="0" value={persediaanData.hargaSatuan} onChange={(val) => setPersediaanData({...persediaanData, hargaSatuan: val})} required /></div>
              <Button type="submit" className="w-full mt-4">Simpan Persediaan</Button>
            </form>
          </Modal>

          <Modal isOpen={modalType === 'kendaraan'} onClose={() => setModalType(null)} title={kendaraanData.id ? "Edit Kendaraan" : "Tambah Kendaraan Baru"}>
            <form onSubmit={handleSaveKendaraan}>
              <Select label="Nama Pemegang" value={kendaraanData.pemegang} onChange={(val) => { const pg = pegawai.find(p => p.nama === val); setKendaraanData({...kendaraanData, pemegang: val, nip: pg?pg.nip:'', jabatan: pg?pg.jabatan:''}); }} options={pegawai.map(p => p.nama)} placeholder="Pilih Pemegang" required />
              <div className="grid grid-cols-2 gap-4"><Input label="Nama Kendaraan / Merk" value={kendaraanData.namaKendaraan} onChange={(val) => setKendaraanData({...kendaraanData, namaKendaraan: val})} required /><Input label="Tahun Pembuatan" type="number" value={kendaraanData.tahun} onChange={(val) => setKendaraanData({...kendaraanData, tahun: val})} required /></div>
              <div className="grid grid-cols-2 gap-4"><Input label="Nomor Polisi" value={kendaraanData.noKendaraan} onChange={(val) => setKendaraanData({...kendaraanData, noKendaraan: val})} required /><Select label="Jenis Kendaraan" value={kendaraanData.jenis} onChange={(val) => setKendaraanData({...kendaraanData, jenis: val})} options={['Roda 2 (Motor)', 'Roda 4 (Mobil)', 'Roda 6 (Truk)']} required /></div>
              <div className="grid grid-cols-3 gap-4"><Input label="Nomor Rangka" value={kendaraanData.noRangka} onChange={(val) => setKendaraanData({...kendaraanData, noRangka: val})} /><Input label="Nomor Mesin" value={kendaraanData.noMesin} onChange={(val) => setKendaraanData({...kendaraanData, noMesin: val})} /><Input label="Tanggal Pajak" type="date" value={kendaraanData.tanggalPajak} onChange={(val) => setKendaraanData({...kendaraanData, tanggalPajak: val})} /></div>
              <Select label="Kondisi" value={kendaraanData.kondisi} onChange={(val) => setKendaraanData({...kendaraanData, kondisi: val})} options={['Baik', 'Rusak Ringan', 'Rusak Berat']} required />
              <Button type="submit" className="w-full mt-4">Simpan Kendaraan</Button>
            </form>
          </Modal>

          <Modal isOpen={modalType === 'assign'} onClose={() => setModalType(null)} title={`Kelola Distribusi: ${selectedPegawai?.nama}`}>
            <div className="mb-6">
              <h4 className="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Barang yang Sedang Dipegang</h4>
              <div className="space-y-2">
                {barang.filter(b => b.peminjamNama === selectedPegawai?.nama).map(b => (
                  <div key={b.id} className="flex justify-between items-center bg-blue-50 p-2 rounded border border-blue-100">
                    <div>
                      <p className="text-sm font-bold">{b.nama} <span className="font-normal text-xs text-gray-600">({b.merk || 'Tanpa Merk'})</span></p>
                      <p className="text-xs text-gray-500">SN: {b.nomorSeri || '-'}</p>
                    </div>
                    <Button variant="danger" onClick={() => handleUnassignBarang(b)} className="text-xs py-1 px-2 h-8">Tarik Aset</Button>
                  </div>
                ))}
                {barang.filter(b => b.peminjamNama === selectedPegawai?.nama).length === 0 && <p className="text-sm text-gray-400 italic">Belum ada barang dipegang.</p>}
              </div>
            </div>
            <div>
              <h4 className="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Serahkan Aset Kosong</h4>
              <Input label="Cari Barang..." placeholder="Ketik nama aset..." value={searchBarangAssign} onChange={setSearchBarangAssign} />
              <Select label="Pilih Barang Tersedia" value={assignBarangId} onChange={setAssignBarangId} options={barang.filter(b => (!b.peminjamNama || b.peminjamNama === '') && b.nama.toLowerCase().includes(searchBarangAssign.toLowerCase())).map(b => ({ label: `${b.nama} (${b.merk || '-'})`, value: b.id }))} placeholder="Daftar kosong..."/>
              <Button onClick={handleAssignBarang} className="w-full mt-2" disabled={!assignBarangId}>Serahkan Barang</Button>
            </div>
          </Modal>

          <aside className="w-64 bg-white border-r border-gray-200 p-6 flex flex-col hidden md:flex print-hide">
            <div className="flex items-center gap-3 mb-10 px-2"><div className="p-2 bg-blue-600 rounded-lg text-white"><Package size={24} /></div><h1 className="font-bold text-xl tracking-tight">E-Aset <span className="text-blue-600">Prokopim</span></h1></div>
            <nav className="space-y-2 flex-1">
              <SidebarItem id="dashboard" icon={LayoutDashboard} label="Dashboard" />
              <SidebarItem id="pegawai" icon={Users} label="Daftar Pegawai" />
              <SidebarItem id="barang" icon={ClipboardList} label="Daftar Barang" />
              <SidebarItem id="pemegang" icon={UserCheck} label="Pemegang Aset" />
              <SidebarItem id="ruangan" icon={Home} label="Inventaris Ruang" />
              <SidebarItem id="kendaraan" icon={Car} label="Daftar Kendaraan" />
              <SidebarItem id="persediaan" icon={FileText} label="Barang Persediaan" />
              <SidebarItem id="administrasi" icon={FileSignature} label="Administrasi" />
            </nav>
            <div className="pt-6 border-t border-gray-100">
              <div className="flex items-center gap-3 px-2 mb-6"><div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><UserCircle size={24} /></div><div className="overflow-hidden"><p className="text-sm font-bold truncate">{user?.name}</p></div></div>
              <button onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg transition-all"><LogOut size={20} /><span className="font-medium">Keluar</span></button>
            </div>
          </aside>

          <main className="flex-1 overflow-y-auto h-screen print:h-auto print:overflow-visible print-doc-area">
            <header className="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10 print-hide">
              <h2 className="text-xl font-bold text-gray-800 capitalize">{view.replace(/([A-Z])/g, ' $1').trim()}</h2>
              {/* Opsi Cetak Standar untuk Tampilan Selain Administrasi */}
              {view !== 'administrasi' && <Button variant="outline" onClick={window.print} className="text-sm h-10"><Download size={16} /> Unduh Laporan</Button>}
            </header>

            <div className="p-8 max-w-7xl mx-auto print:p-0">
              
              {view === 'dashboard' && (
                <div className="space-y-8 print-hide">
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <Card title="Total Pegawai" subtitle={pegawai.length} icon={Users} />
                    <Card title="Total Barang Aset" subtitle={barang.length} icon={ClipboardList} />
                    <Card title="Jumlah Ruangan" subtitle={ruangan.length} icon={Home} />
                    <Card title="Total Kendaraan" subtitle={kendaraan.length} icon={Car} />
                  </div>
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm col-span-1">
                      <h4 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 border-b pb-3">Status Pegawai</h4>
                      <div className="grid grid-cols-4 gap-2">
                         <div className="bg-blue-50 rounded-lg p-3 text-center border border-blue-100"><p className="text-xl font-bold text-blue-700">{statusPNS}</p><p className="text-[9px] font-semibold text-blue-600 mt-1 uppercase">PNS</p></div>
                         <div className="bg-emerald-50 rounded-lg p-3 text-center border border-emerald-100"><p className="text-xl font-bold text-emerald-700">{statusPPPK}</p><p className="text-[9px] font-semibold text-emerald-600 mt-1 uppercase">PPPK</p></div>
                         <div className="bg-orange-50 rounded-lg p-3 text-center border border-orange-100"><p className="text-xl font-bold text-orange-700">{statusPPPKPW}</p><p className="text-[9px] font-semibold text-orange-600 mt-1 uppercase">PPPK PW</p></div>
                         <div className="bg-purple-50 rounded-lg p-3 text-center border border-purple-100"><p className="text-xl font-bold text-purple-700">{statusOutsourcing}</p><p className="text-[9px] font-semibold text-purple-600 mt-1 uppercase">Out</p></div>
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm col-span-1">
                      <h4 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 border-b pb-3">Penempatan Pegawai</h4>
                      <div className="space-y-2"><div className="flex justify-between text-sm"><span className="text-gray-600">Bag. Prokopim</span><span className="font-bold">{pProkopim}</span></div><div className="flex justify-between text-sm"><span className="text-gray-600">Sub. Protokol</span><span className="font-bold">{pProtokol}</span></div><div className="flex justify-between text-sm"><span className="text-gray-600">Sub. Komunikasi</span><span className="font-bold">{pKomunikasi}</span></div><div className="flex justify-between text-sm"><span className="text-gray-600">Sub. Dokumentasi</span><span className="font-bold">{pDokumentasi}</span></div></div>
                    </div>
                    <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm col-span-1">
                      <h4 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 border-b pb-3">Statistik Kendaraan</h4>
                      <div className="grid grid-cols-2 gap-4"><div className="bg-gray-50 rounded-lg p-4 text-center border border-gray-100"><p className="text-3xl font-bold text-gray-800">{kRoda2}</p><p className="text-xs font-semibold text-gray-500 mt-1">RODA 2</p></div><div className="bg-gray-50 rounded-lg p-4 text-center border border-gray-100"><p className="text-3xl font-bold text-gray-800">{kRoda4}</p><p className="text-xs font-semibold text-gray-500 mt-1">RODA 4</p></div></div>
                    </div>
                  </div>
                </div>
              )}

              {view === 'pegawai' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="p-6 border-b flex justify-between print-hide"><h3 className="font-bold text-lg">Daftar Pegawai</h3><Button onClick={() => { setNewPegawai(initialPegawaiState); setModalType('pegawai'); }}><Plus size={18}/> Tambah</Button></div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-xs whitespace-nowrap">
                      <thead className="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold border-b">
                        <tr>
                          <th className="px-4 py-3">Nama</th>
                          <th className="px-4 py-3">NIP</th>
                          <th className="px-4 py-3">No. KTP</th>
                          <th className="px-4 py-3">Jabatan</th>
                          <th className="px-4 py-3">Alamat</th>
                          <th className="px-4 py-3 print-hide">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {pegawai.map(p => (
                          <tr key={p.id} className="hover:bg-gray-50">
                            <td className="px-4 py-3 font-bold text-gray-800">{p.nama}</td>
                            <td className="px-4 py-3 font-mono text-gray-600">{p.nip}</td>
                            <td className="px-4 py-3 font-mono text-gray-600">{p.ktp || '-'}</td>
                            <td className="px-4 py-3">{p.jabatan}</td>
                            <td className="px-4 py-3 text-gray-600 max-w-[200px] truncate" title={p.alamat}>{p.alamat || '-'}</td>
                            <td className="px-4 py-3 print-hide">
                              <div className="flex gap-1">
                                <button className="p-1.5 text-blue-600 hover:bg-blue-50 rounded" onClick={() => { setNewPegawai(p); setModalType('pegawai'); }}><Edit3 size={14}/></button>
                                <button className="p-1.5 text-red-500 hover:bg-red-50 rounded" onClick={() => { if(window.confirm("Yakin ingin menghapus pegawai ini?")) deleteFromDb('pegawai', p.id); }}><Trash2 size={14}/></button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {view === 'barang' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="p-6 border-b flex flex-col md:flex-row gap-4 justify-between items-center print-hide">
                    <div className="flex items-center gap-3"><h3 className="font-bold text-lg">Daftar Barang Aset</h3><span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">Total: {barang.length} Barang</span></div>
                    <div className="flex gap-3 items-center w-full md:w-auto flex-wrap">
                      <div className="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border"><Filter size={16} className="text-gray-400" /><select value={groupByBarang} onChange={(e) => setGroupByBarang(e.target.value)} className="bg-transparent text-sm font-medium outline-none text-gray-600 cursor-pointer"><option value="">Semua (Tanpa Grup)</option><option value="tahun">Grup berdasar Tahun</option><option value="lokasi">Grup berdasar Lokasi</option><option value="kondisi">Grup berdasar Kondisi</option></select></div>
                      <Button variant="outline" onClick={downloadTemplateExcelBarang} className="bg-white text-sm h-10"><Download size={16} /> Template</Button>
                      <input type="file" accept=".xlsx, .csv" className="hidden" ref={fileInputRef} onChange={handleImportExcelBarang}/>
                      <Button variant="secondary" onClick={() => fileInputRef.current.click()} className="text-sm h-10"><Cloud size={16} /> Import Excel</Button>
                      <Button onClick={() => { setBarangData(initialBarangState); setModalType('barang'); }} className="text-sm h-10"><Plus size={18}/> Tambah</Button>
                    </div>
                  </div>
                  <div className="p-0">{groupByBarang === '' ? (<div className="overflow-x-auto"><table className="w-full text-left text-xs whitespace-nowrap"><thead className="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold border-b"><tr><th className="px-3 py-2">Foto</th><th className="px-3 py-2">Barang & SN</th><th className="px-3 py-2 text-center">Tahun</th><th className="px-3 py-2">Kondisi</th><th className="px-3 py-2">Merk & Lokasi</th><th className="px-3 py-2">Status & Pemegang</th><th className="px-3 py-2 print-hide">Aksi</th></tr></thead><tbody className="divide-y divide-gray-100">{barang.length === 0 ? <tr><td colSpan="7" className="text-center py-8 text-gray-400 italic">Belum ada barang terdaftar</td></tr> : renderBarangRows(barang)}</tbody></table></div>) : (<div className="space-y-6 p-6">{[...new Set(barang.map(b => b[groupByBarang] || 'Tidak Diketahui'))].sort().map(groupVal => { const groupItems = barang.filter(b => (b[groupByBarang] || 'Tidak Diketahui') === groupVal); return (<div key={groupVal} className="border border-blue-200 rounded-xl overflow-hidden shadow-sm"><div className="bg-blue-50 px-6 py-3 font-bold text-blue-800 flex justify-between items-center border-b border-blue-100"><span className="uppercase text-sm tracking-wider">{groupByBarang}: {groupVal}</span><span className="bg-white px-3 py-1 rounded-full text-xs shadow-sm">{groupItems.length} Item</span></div><div className="overflow-x-auto"><table className="w-full text-left text-xs whitespace-nowrap"><thead className="bg-gray-50 text-gray-400 uppercase text-[10px] font-bold border-b"><tr><th className="px-3 py-2 print-hide">Foto</th><th className="px-3 py-2">Barang</th><th className="px-3 py-2 text-center">Tahun</th><th className="px-3 py-2">Kondisi</th><th className="px-3 py-2">Lokasi</th><th className="px-3 py-2">Status</th><th className="px-3 py-2 print-hide">Aksi</th></tr></thead><tbody className="divide-y divide-gray-100 bg-white">{renderBarangRows(groupItems)}</tbody></table></div></div>) })}</div>)}</div>
                </div>
              )}

              {view === 'pemegang' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="p-6 border-b print-hide"><h3 className="font-bold text-lg">Distribusi & Pemegang Aset</h3></div>
                  <table className="w-full text-left text-xs"><thead className="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold border-b"><tr><th className="px-4 py-3">Nama Pegawai</th><th className="px-4 py-3">Jabatan</th><th className="px-4 py-3 text-center">Jml Aset Dipegang</th><th className="px-4 py-3 text-center print-hide">Aksi</th></tr></thead><tbody className="divide-y divide-gray-100">{pegawai.map(p => { const count = barang.filter(b => b.peminjamNama === p.nama).length; return (<tr key={p.id} className="hover:bg-gray-50"><td className="px-4 py-3 font-bold text-gray-800">{p.nama}</td><td className="px-4 py-3 text-gray-600">{p.jabatan}</td><td className="px-4 py-3 text-center"><span className="bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded-full">{count} Item</span></td><td className="px-4 py-3 text-center print-hide"><Button onClick={() => { setSelectedPegawai(p); setModalType('assign'); }} variant="outline" className="text-[10px] h-7 mx-auto px-2 py-1">Kelola Distribusi</Button></td></tr>)})}</tbody></table>
                </div>
              )}

              {view === 'ruangan' && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {ruangan.map(r => (<div key={r.id} className="bg-white rounded-xl border overflow-hidden shadow-sm flex flex-col"><div className="relative p-6 text-white min-h-[120px] flex items-center"><div className="absolute inset-0 z-0">{r.foto ? <><img src={r.foto} className="w-full h-full object-cover"/><div className="absolute inset-0 bg-black/60"></div></> : <div className="w-full h-full bg-blue-600"></div>}</div><div className="relative z-10"><h4 className="font-bold text-lg">{r.nama}</h4></div></div><div className="p-6 flex-1"><table className="w-full text-sm text-left"><thead className="text-gray-500 border-b border-dashed"><tr><th className="py-1">Barang</th><th className="py-1 text-center">Jml</th><th className="py-1 text-right">Kondisi</th></tr></thead><tbody>{r.items?.map(i => <tr key={i.id} className="border-b border-gray-50"><td className="py-2">{i.nama}</td><td className="py-2 text-center">{i.jumlah}</td><td className="py-2 text-right">{i.kondisi}</td></tr>)}</tbody></table></div><div className="px-6 py-4 bg-gray-50 border-t flex gap-2 print-hide"><button onClick={() => { setRuanganData(r); setModalType('ruangan'); }} className="flex-1 py-2 bg-white border text-blue-600 rounded flex items-center justify-center gap-2"><Edit3 size={16}/> Edit</button><button onClick={() => { if(window.confirm('Hapus seluruh ruangan ini?')) deleteFromDb('ruangan', r.id); }} className="flex-1 py-2 bg-white border text-red-600 rounded flex items-center justify-center gap-2"><Trash2 size={16}/> Hapus</button></div></div>))}
                  <div onClick={() => { setRuanganData({id:null, nama:'', foto:'', items:[]}); setModalType('ruangan'); }} className="border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center p-12 hover:bg-blue-50 cursor-pointer text-center print-hide"><Plus className="mx-auto text-gray-400 mb-2" size={32}/><p className="font-medium text-gray-500">Tambah Ruangan</p></div>
                </div>
              )}

              {view === 'kendaraan' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="p-6 border-b flex justify-between print-hide"><h3 className="font-bold text-lg">Kendaraan Dinas</h3><Button onClick={() => { setKendaraanData(initialKendaraanState); setModalType('kendaraan'); }}><Plus size={18}/> Tambah</Button></div>
                  <div className="overflow-x-auto"><table className="w-full text-left whitespace-nowrap text-xs"><thead className="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold border-b"><tr><th className="px-4 py-3">Kendaraan</th><th className="px-4 py-3">No. Polisi / Detail</th><th className="px-4 py-3">Pemegang</th><th className="px-4 py-3">Jenis</th><th className="px-4 py-3">Tgl Pajak</th><th className="px-4 py-3 print-hide">Aksi</th></tr></thead><tbody className="divide-y divide-gray-100">{kendaraan.map(k => (<tr key={k.id} className="hover:bg-gray-50"><td className="px-4 py-3"><p className="font-bold text-gray-800">{k.namaKendaraan}</p><p className="text-[10px] text-gray-500">Tahun: {k.tahun}</p></td><td className="px-4 py-3"><span className="font-mono font-bold text-blue-700 bg-blue-50 px-2 py-1 rounded">{k.noKendaraan}</span><div className="mt-1 text-[10px] text-gray-500"><p>Rangka: {k.noRangka || '-'}</p><p>Mesin: {k.noMesin || '-'}</p></div></td><td className="px-4 py-3"><p className="font-medium text-gray-800">{k.pemegang}</p><p className="text-[10px] text-gray-500 font-mono">{k.nip}</p></td><td className="px-4 py-3 text-gray-600">{k.jenis}</td><td className="px-4 py-3 font-mono text-gray-600">{k.tanggalPajak ? new Date(k.tanggalPajak).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'}) : '-'}</td><td className="px-4 py-3 print-hide"><div className="flex gap-1"><button className="p-1.5 text-blue-600 hover:bg-blue-50 rounded" onClick={() => { setKendaraanData(k); setModalType('kendaraan'); }}><Edit3 size={14}/></button><button className="p-1.5 text-red-500 hover:bg-red-50 rounded" onClick={() => { if(window.confirm('Hapus kendaraan ini?')) deleteFromDb('kendaraan', k.id); }}><Trash2 size={14}/></button></div></td></tr>))}</tbody></table></div>
                </div>
              )}

              {view === 'persediaan' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="p-6 border-b flex justify-between print-hide"><h3 className="font-bold text-lg">Kartu Persediaan</h3><div className="flex gap-2"><Button variant="secondary" onClick={() => { setStokData({idBarang:'', jenisTransaksi:'Penambahan', jumlah:1}); setModalType('stok'); }}>Update Stok</Button><Button onClick={() => { setPersediaanData(initialPersediaanState); setModalType('persediaan_form'); }}>Tambah Barang</Button></div></div>
